<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Listening Practice — Cambridge 17-19</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; padding-bottom: 72px; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 20px 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.header h1 { font-size: 1.5rem; font-weight: 600; }
.header p { font-size: 0.85rem; opacity: 0.75; margin-top: 4px; }

.container { max-width: 960px; margin: 0 auto; padding: 24px 20px 80px; }

.selector-bar { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.selector-bar label { font-weight: 600; font-size: 0.9rem; color: #555; }
.selector-bar select { padding: 8px 14px; border: 1.5px solid #d0d5dd; border-radius: 8px; font-size: 0.9rem; background: #fff; cursor: pointer; min-width: 180px; }
.selector-bar select:focus { outline: none; border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.1); }

.test-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); overflow: hidden; }
.test-header { background: #f8f9fb; padding: 18px 24px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.test-header h2 { font-size: 1.2rem; color: #0f3460; }
.test-header .meta { font-size: 0.8rem; color: #888; margin-top: 2px; }
.test-header .fav-filter { font-size: 0.85rem; color: #f59e0b; cursor: pointer; background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; padding: 6px 14px; font-weight: 500; }
.test-header .fav-filter.active { background: #f59e0b; color: #fff; border-color: #f59e0b; }

.part-tabs { display: flex; gap: 2px; background: #e5e7eb; padding: 4px; margin: 16px 24px; border-radius: 10px; overflow-x: auto; }
.part-tab { padding: 10px 22px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: #666; transition: all 0.2s; white-space: nowrap; }
.part-tab:hover { color: #0f3460; }
.part-tab.active { background: #0f3460; color: #fff; }

.part-content { padding: 0 24px 24px; }
.part-content h3 { font-size: 1.05rem; color: #333; margin-bottom: 8px; }
.instruction { background: #fefce8; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 16px; font-size: 0.85rem; color: #92400e; margin-bottom: 20px; }

.question { margin-bottom: 22px; padding: 16px; background: #f9fafb; border-radius: 10px; border: 1px solid #e5e7eb; transition: border-color 0.2s; position: relative; }
.question:hover { border-color: #c4b5fd; }
.q-header { display: flex; align-items: flex-start; gap: 12px; }
.q-num { background: #0f3460; color: #fff; min-width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
.q-body { flex: 1; }
.q-text { font-size: 0.92rem; line-height: 1.5; color: #333; }
.q-text .vocab { cursor: pointer; border-bottom: 1px dashed #93c5fd; color: #2563eb; transition: background 0.15s; }
.q-text .vocab:hover { background: #dbeafe; border-radius: 2px; }
.q-input { margin-top: 12px; margin-left: 48px; }

.q-input input[type="text"] { width: 100%; max-width: 400px; padding: 10px 14px; border: 1.5px solid #d0d5dd; border-radius: 8px; font-size: 0.9rem; transition: border-color 0.2s; }
.q-input input[type="text"]:focus { outline: none; border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.08); }

.star-btn { position: absolute; top: 12px; right: 14px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #d1d5db; transition: all 0.2s; padding: 4px 6px; border-radius: 6px; }
.star-btn:hover { color: #f59e0b; background: #fffbeb; }
.star-btn.starred { color: #f59e0b; }

.option { display: flex; align-items: flex-start; gap: 10px; margin: 8px 0; padding: 10px 14px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
.option:hover { background: #f0f0f5; }
.option input { margin-top: 2px; cursor: pointer; }
.option label { font-size: 0.9rem; color: #444; cursor: pointer; line-height: 1.4; }

.result-icon { display: inline-block; margin-left: 8px; font-size: 0.9rem; }
.correct { color: #059669; font-weight: 600; }
.wrong { color: #dc2626; font-weight: 600; }

.btn-row { padding: 0 24px 20px; display: flex; gap: 12px; flex-wrap: wrap; }
.btn { padding: 10px 28px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-submit { background: #0f3460; color: #fff; }
.btn-submit:hover { background: #1a4971; }
.btn-clear { background: #e5e7eb; color: #555; }
.btn-clear:hover { background: #d1d5db; }
.btn-show { background: #f59e0b; color: #fff; }
.btn-show:hover { background: #d97706; }

.score-bar { margin: 16px 24px; padding: 16px 20px; background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); border: 1px solid #6ee7b7; border-radius: 10px; display: none; }
.score-bar h3 { font-size: 1rem; color: #065f46; margin-bottom: 4px; }
.score-bar .score { font-size: 1.4rem; font-weight: 700; color: #059669; }
.score-bar .band-badge { display: inline-block; background: #0f3460; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 0.95rem; font-weight: 700; margin-left: 12px; }

.answered-correct { border-color: #6ee7b7 !important; background: #f0fdf4 !important; }
.answered-wrong { border-color: #fca5a5 !important; background: #fef2f2 !important; }

.total-score { margin: 20px 24px; padding: 20px; background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border: 2px solid #93c5fd; border-radius: 12px; display: none; }
.total-score h2 { font-size: 1.1rem; color: #1e40af; }
.total-score .big-score { font-size: 2.2rem; font-weight: 800; color: #2563eb; }
.total-score .band-big { display: inline-block; background: #1e40af; color: #fff; padding: 8px 24px; border-radius: 24px; font-size: 1.1rem; font-weight: 700; margin-left: 16px; vertical-align: middle; }

/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 2px solid #e5e7eb; display: flex; z-index: 1000; box-shadow: 0 -2px 12px rgba(0,0,0,0.08); }
.nav-item { flex: 1; text-align: center; padding: 10px 4px 8px; cursor: pointer; transition: all 0.2s; color: #888; font-size: 0.75rem; border: none; background: none; }
.nav-item:hover { color: #0f3460; background: #f8f9fb; }
.nav-item.active { color: #0f3460; font-weight: 700; }
.nav-item .nav-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }
.nav-item .nav-count { display: inline-block; background: #ef4444; color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 0.65rem; font-weight: 700; margin-left: 2px; vertical-align: top; }

/* Word Bank Panel */
.panel { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 20px; }
.panel-header { background: #f8f9fb; padding: 16px 24px; border-bottom: 1px solid #e5e7eb; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; }
.panel-header h2 { font-size: 1.1rem; color: #0f3460; }
.panel-body { padding: 20px 24px; }
.word-chip { display: inline-flex; align-items: center; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 20px; padding: 6px 12px; margin: 4px; font-size: 0.85rem; color: #1e40af; gap: 6px; }
.word-chip .del-word { cursor: pointer; color: #93c5fd; font-weight: 700; font-size: 1rem; }
.word-chip .del-word:hover { color: #dc2626; }

/* Writing Template */
.template-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 20px; overflow: hidden; }
.template-card .panel-header { border-radius: 12px 12px 0 0; }
.step { padding: 12px 16px; margin: 8px 0; background: #f9fafb; border-radius: 8px; border-left: 3px solid #0f3460; }
.step h4 { font-size: 0.9rem; color: #0f3460; margin-bottom: 4px; }
.step p { font-size: 0.85rem; color: #555; line-height: 1.5; }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; padding: 10px 24px; border-radius: 24px; font-size: 0.85rem; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

footer { text-align: center; padding: 20px; color: #aaa; font-size: 0.75rem; border-top: 1px solid #e5e7eb; margin-top: 20px; }
.part-score-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
.part-score-chip { background: #f0fdf4; border: 1px solid #6ee7b7; border-radius: 8px; padding: 4px 10px; font-size: 0.8rem; color: #065f46; }
.part-score-chip.pending { background: #fefce8; border-color: #fde68a; color: #92400e; }
</style>
</head>

": "B"}, {"id": 14, "type": "multiple_choice", "question_text": "What should people do with their litter?", "options": ["A take it home", "B hand it to a member of staff", "C put it in bins provided on the boat"], "answer": "B"}, {"id": "15&16", "type": "multiple_choice_multi", "question_text": "Which TWO features of the lighthouse does Lou mention?", "options": ["A why it was built", "B who built it", "C how long it took to build", "D who staffed it", "E what it was built with"], "answer": ["A", "D"]}, {"id": "17&18", "type": "multiple_choice_multi", "question_text": "Which TWO types of creature might come close to the boat?", "options": ["A sea eagles", "B fur seals", "C dolphins", "D whales", "E penguins"], "answer": ["B", "C"]}, {"id": "19&20", "type": "multiple_choice_multi", "question_text": "Which TWO points does Lou make about the caves?", "options": ["A Only large tourist boats can visit them.", "B The entrances to them are often blocked.", "C It is too dangerous for individuals to go near them.", "D Someone will explain what is inside them.", "E They cannot be reached on foot."], "answer": ["D", "E"]}]}, {"part": 3, "title": "Work experience for veterinary science students", "instruction": "Choose the correct letter A, B or C.", "questions": [{"id": 21, "type": "multiple_choice", "question_text": "What problem did both Diana and Tim have when arranging their work experience?", "options": ["A making initial contact with suitable farms", "B organising transport to and from the farm", "C finding a placement for the required length of time"], "answer": "A"}, {"id": 22, "type": "multiple_choice", "question_text": "Tim was pleased to be able to help", "options": ["A a lamb that had a broken leg.", "B a sheep that was having difficulty giving birth.", "C a newly born lamb that was having trouble feeding."], "answer": "B"}, {"id": 23, "type": "multiple_choice", "question_text": "Diana says the sheep on her farm", "options": ["A were of various different varieties. ease", "options": ["A Tim found this easier than expected.", "B Tim thought this was not very clearly organised.", "C Diana may do some further study on this.", "D They both found the reading required for this was difficult.", "E Tim was shocked at something he learned on this module.", "F They were both surprised how little is known about some aspects of this."], "answer": "F"}, {"id": 30, "type": "matching", "question_text": "Wildlife medication", "options": ["A Tim found this easier than expected.", "B Tim thought this was not very clearly organised.", "C Diana may do some further study on this.", "D They both found the reading required for this was difficult.", "E Tim was shocked at something he learned on this module.", "F They were both surprised how little is known about some aspects of this."], "answer": "C"}]}, {"part": 4, "title": "Labyrinths", "instruction": "Complete the notes below. Write ONE WORD ONLY for each answer.", "questions": [{"id": 31, "type": "note_completion", "question_text": "Mazes are a type of ______", "answer": "puzzle"}, {"id": 32, "type": "note_completion", "question_text": "______ is needed to navigate through a maze", "answer": "logic"}, {"id": 33, "type": "note_completion", "question_text": "the word 'maze' is derived from a word meaning a feeling of ______", "answer": "confusion"}, {"id": 34, "type": "note_completion", "question_text": "they have frequently been used in ______ and prayer", "answer": "meditation"}, {"id": 35, "type": "note_completion", "question_text": "Ancient carvings on ______ have been found across many cultures", "answer": "stone"}, {"id": 36, "type": "note_completion", "question_text": "Ancient Greeks used the symbol on ______", "answer": "coins"}, {"id": 37, "type": "note_completion", "question_text": "The largest surviving example of a turf labyrinth once had a big ______ at its centre", "answer": "tree"}, {"id": 38, "type": "note_completion", "question_text": "walking a maze can reduce a person's ______ rate", "answer": "breathing"}, {"id": 39, "type": "note_completion", "question_text": "patients who can't walk can use 'finger labyrinths' made from ______", "answer": "paper"}, {"id": 40, "type": "note_completion", "question_text": "research has shown that Alzheimer's sufferers experience less ______", "answer": "anxiety"}]}]}, "C17T2": {"title": "Cambridge IELTS 17 Listening Test 2", "parts": [{"part": 1, "title": "Voluntary work in Southoe village", "instruction": "Complete the notes below. Write ONE WORD AND/OR A NUMBER for each answer.", "questions": [{"id": 1, "type": "note_completion", "question_text": "Help with ______ books (times to be arranged)", "answer": "collecting"}, {"id": 2, "type": "note_completion", "question_text": "Help needed to keep ______ of books up to date", "answer": "records"}, {"id": 3, "type": "note_completion", "question_text": "Library is in the ______ Room in the village hall", "answer": "West"}, {"id": 4, "type": "note_completion", "question_text": "Help by providing ______", "answer": "transport"}, {"id": 5, "type": "note_completion", "question_text": "Help with hobbies such as ______", "answer": "art"}, {"id": 6, "type": "note_completion", "question_text": "Taking Mrs Carroll to ______", "answer": "hospital"}, {"id": 7, "type": "note_completion", "question_text": "Work in the ______ at Mr Selsbury's house", "answer": "garden"}, {"id": 8, "type": "table_completion", "question_text": "19 Oct event: ______", "answer": "quiz"}, {"id": 9, "type": "table_completion", "question_text": "18 Nov Dance: checking ______", "answer": "tickets"}, {"id": 10, "type": "table_completion", "question_text": "31 Dec New year's eve party: designing the ______", "answer": "poster"}]}, {"part": 2, "title": "Oniton Hall", "instruction": "Choose the correct letter A, B or C.", "questions": [{"id": 11, "type": "multiple_choice", "question_text": "Many past owners made changes to", "options": ["A the gardens.", "B the house.", "C the farm."], "answer": "B"}, {" // Band Score table
const BAND_TABLE = [
    [39,40,9.0],[37,38,8.5],[35,36,8.0],[32,34,7.5],[30,31,7.0],
    [26,29,6.5],[23,25,6.0],[18,22,5.5],[16,17,5.0],
    [13,15,4.5],[11,12,4.0],[8,10,3.5],[6,7,3.0],[4,5,2.5]
];

function getBandScore(correct) {
    for (var i = 0; i < BAND_TABLE.length; i++) {
        if (correct >= BAND_TABLE[i][0] && correct <= BAND_TABLE[i][1]) return BAND_TABLE[i][2];
    }
    return correct <= 3 ? 2.0 : 9.0;
}

// ============ STATE ============
var currentTestKey = 'C17T1';
var currentPart = 0;
var currentPage = 'practice'; // practice | bookmarks | vocab | writing
var submitted = false;
// Per-test part scores: { testKey: { part0: N, part1: N, part2: N, part3: N } }
var partScores = {};

// ============ STORAGE HELPERS ============
function lsGet(key, fallback) {
    try { var v = localStorage.getItem('ielts_' + key); return v ? JSON.parse(v) : fallback; }
    catch(e) { return fallback; }
}
function lsSet(key, val) {
    try { localStorage.setItem('ielts_' + key, JSON.stringify(val)); } catch(e) {}
}
function getBookmarks() { return lsGet('bookmarks', {}); }
function setBookmarks(bm) { lsSet('bookmarks', bm); }
function getVocab() { return lsGet('vocab', []); }
function setVocab(v) { lsSet('vocab', v); }

// ============ TOAST ============
function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

// ============ PAGE ROUTING ============
document.getElementById('bottomNav').addEventListener('click', function(e) {
    var btn = e.target.closest('.nav-item');
    if (!btn) return;
    var page = btn.dataset.page;
    switchPage(page);
});

function switchPage(page) {
    currentPage = page;
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.toggle('active', n.dataset.page === page); });
    if (page === 'practice') renderPractice();
    else if (page === 'bookmarks') renderBookmarks();
    else if (page === 'vocab') renderVocabPanel();
    else if (page === 'writing') renderWriting();
    updateNavCounts();
}

function updateNavCounts() {
    var bm = getBookmarks();
    var bCount = Object.keys(bm).length;
    var bc = document.getElementById('bookmarkCount');
    bc.textContent = bCount;
    bc.style.display = bCount > 0 ? 'inline-block' : 'none';
    var v = getVocab();
    var vc = document.getElementById('vocabCount');
    vc.textContent = v.length;
    vc.style.display = v.length > 0 ? 'inline-block' : 'none';
}

// ============ MAIN PRACTICE PAGE ============
function renderPractice() {
    var html = '';
    html += '<div class="selector-bar">';
    html += '<label>Cambridge:</label><select id="bookSelect" onchange="onBookChange()">';
    ['C17','C18','C19'].forEach(function(b) {
        html += '<option value="' + b + '"' + (currentTestKey.indexOf(b)===0?' selected':'') + '>' + b.replace('C','Cambridge ') + '</option>';
    });
    html += '</select>';
    html += '<label>Test:</label><select id="testSelect" onchange="onTestChange()">';
    [1,2,3,4].forEach(function(t) {
        var tk = currentTestKey.replace(/T\d$/, 'T' + t);
        html += '<option value="' + t + '"' + (currentTestKey === tk?' selected':'') + '>Test ' + t + '</option>';
    });
    html += '</select>';
    html += '</div><div id="testContainer"></div>';
    document.getElementById('mainContainer').innerHTML = html;
    renderTest();
}

function onBookChange() {
    var book = document.getElementById('bookSelect').value;
    currentTestKey = book + 'T1';
    currentPart = 0;
    renderTest();
}

function onTestChange() {
    var t = document.getElementById('testSelect').value;
    var book = document.getElementById('bookSelect').value;
    currentTestKey = book + 'T' + t;
    currentPart = 0;
    renderTest();
}

function renderTest() {
    if (currentPage !== 'practice') return;
    var test = ALL_TESTS[currentTestKey];
    if (!test) { document.getElementById('testContainer').innerHTML = '<div style="text-align:center;padding:60px;color:#999;"><h3>No test data</h3></div>'; return; }
    submitted = false;

    var filterFav = false;
    var bm = getBookmarks();

    var html = '<div class="test-card">';
    html += '<div class="test-header"><div><h2>' + test.title + '</h2><div class="meta">' + test.parts.length + ' parts</div></div>';
    html += '<button class="fav-filter" id="favFilterBtn" onclick="toggleFavFilter()">&#11088; Show Favorites Only</button>';
    html += '</div>';

    html += '<div class="part-tabs">';
    test.parts.forEach(function(p,i) {
        html += '<button class="part-tab' + (i===currentPart?' active':'') + '" onclick="switchPart(' + i + ')">Part ' + p.part + ': ' + p.title + '</button>';
    });
    html += '</div>';

    var part = test.parts[currentPart];
    html += '<div class="part-content" id="partContent">';
    html += '<h3>Part ' + part.part + ': ' + part.title + '</h3>';
    html += '<div class="instruction">' + part.instruction + '</div>';

    part.questions.forEach(function(q) {
        var qkey = currentTestKey + '_' + currentPart + '_' + q.id;
        var starred = !!bm[qkey];
        html += '<div class="question" data-qid="' + q.id + '" data-qkey="' + qkey + '">';
        html += '<button class="star-btn' + (starred?' starred':'') + '" onclick="toggleStar(this, \'' + qkey + '\')" title="Bookmark">' + (starred?'&#9733;':'&#9734;') + '</button>';
        html += '<div class="q-header">';
        html += '<div class="q-num">' + q.id + '</div>';
        html += '<div class="q-body">';
        html += '<div class="q-text">' + makeVocabClickable(q.question_text) + '</div>';
        html += '</div>';
        html += '<span class="result-icon"></span>';
        html += '</div>';
        html += '<div class="q-input">';
        html += renderQuestionInput(q);
        html += '</div>';
        html += '</div>';
    });
    html += '</div>';

    html += '<div class="btn-row">';
    html += '<button class="btn btn-submit" onclick="submitPart()">Submit Part ' + part.part + '</button>';
    html += '<button class="btn btn-clear" onclick="clearPart()">Clear</button>';
    html += '<button class="btn btn-show" onclick="showAnswers()">Show Answers</button>';
    html += '</div>';
    html += '<div class="score-bar" id="scoreBar' + currentPart + '"><h3>Score for Part ' + part.part + '</h3><div class="score" id="scoreText' + currentPart + '"></div><span class="band-badge" id="bandBadge' + currentPart + '" style="display:none"></span></div>';
    html += '<div class="total-score" id="totalScoreBar"><h2>Overall Score (all 4 parts)</h2>';
    html += '<div class="part-score-row" id="partScoreRow"></div>';
    html += '<div class="big-score" id="totalScoreText"></div><span class="band-big" id="totalBandBadge" style="display:none"></span>';
    html += '</div>';
    html += '</div>'; // test-card
    html += '</div>'; // testContainer

    document.getElementById('testContainer').innerHTML = html;
    updateFavFilterBtn();
}

function updateFavFilterBtn() {
    var btn = document.getElementById('favFilterBtn');
    if (!btn) return;
    var bm = getBookmarks();
    var count = 0;
    var test = ALL_TESTS[currentTestKey];
    test.parts.forEach(function(p, pi) {
        p.questions.forEach(function(q) {
            if (bm[currentTestKey + '_' + pi + '_' + q.id]) count++;
        });
    });
    btn.textContent = btn.classList.contains('active') ? ('\u2B50 Show All (' + count + ' starred)') : ('\u2B50 Show Favorites Only (' + count + ')');
}

function toggleFavFilter() {
    var btn = document.getElementById('favFilterBtn');
    btn.classList.toggle('active');
    updateFavFilterBtn();
    currentPart = 0;
    renderTest();
}

function toggleStar(btn, qkey) {
    var bm = getBookmarks();
    if (bm[qkey]) {
        delete bm[qkey];
        btn.classList.remove('starred');
        btn.innerHTML = '&#9734;';
        toast('Removed from favorites');
    } else {
        bm[qkey] = true;
        btn.classList.add('starred');
        btn.innerHTML = '&#9733;';
        toast('Added to favorites!');
    }
    setBookmarks(bm);
    updateNavCounts();
    updateFavFilterBtn();
}

function makeVocabClickable(text) {
    // Split text into words, make substantive words clickable
    return text.replace(/([A-Za-z][a-z]{2,}|[A-Z]{2,})/g, function(match) {
        return '<span class="vocab" onclick="addVocab(\'' + match.toLowerCase().replace(/'/g, "\\'") + '\', event)" title="Add to word bank">' + match + '</span>';
    });
}

function addVocab(word, event) {
    if (event) event.stopPropagation();
    var vocab = getVocab();
    if (vocab.indexOf(word) === -1) {
        vocab.push(word);
        setVocab(vocab);
        toast('Added "' + word + '" to word bank!');
        updateNavCounts();
    } else {
        toast('"' + word + '" is already in word bank');
    }
}

function renderQuestionInput(q) {
    var qid = String(q.id);
    var type = q.type;

    if (type === 'note_completion' || type === 'form_completion' || type === 'table_completion') {
        return '<input type="text" id="q_' + qid + '" placeholder="Type your answer..." autocomplete="off">';
    }
    if (type === 'multiple_choice') {
        return q.options.map(function(o, i) {
            var letter = o.charAt(0);
            return '<div class="option"><input type="radio" name="q_' + qid + '" id="q_' + qid + '_' + i + '" value="' + letter + '"><label for="q_' + qid + '_' + i + '">' + o + '</label></div>';
        }).join('');
    }
    if (type === 'multiple_choice_multi') {
        return q.options.map(function(o, i) {
            var letter = o.charAt(0);
            return '<div class="option"><input type="checkbox" name="q_' + qid + '" id="q_' + qid + '_' + i + '" value="' + letter + '"><label for="q_' + qid + '_' + i + '">' + o + '</label></div>';
        }).join('');
    }
    if (type === 'matching' || type === 'map_labeling' || type === 'flowchart_completion') {
        return q.options.map(function(o, i) {
            var val = o.charAt(0);
            return '<div class="option"><input type="radio" name="q_' + qid + '" id="q_' + qid + '_' + i + '" value="' + val + '"><label for="q_' + qid + '_' + i + '">' + o + '</label></div>';
        }).join('');
    }
    return '<input type="text" id="q_' + qid + '" placeholder="Type your answer..." autocomplete="off">';
}

function switchPart(idx) {
    currentPart = idx;
    renderTest();
}

function getUserAnswer(q) {
    var qid = String(q.id);
    var type = q.type;
    if (type === 'note_completion' || type === 'form_completion' || type === 'table_completion') {
        var el = document.getElementById('q_' + qid);
        return el ? el.value.trim().toLowerCase() : '';
    }
    if (type === 'multiple_choice_multi') {
        var checked = document.querySelectorAll('input[name="q_' + qid + '"]:checked');
        var vals = [];
        checked.forEach(function(c) { vals.push(c.value); });
        return vals.sort().join(',');
    }
    var radio = document.querySelector('input[name="q_' + qid + '"]:checked');
    return radio ? radio.value : '';
}

function normalizeAnswer(ans) {
    if (Array.isArray(ans)) return ans;
    if (typeof ans === 'string' && ans.indexOf('/') !== -1) {
        return ans.split('/').map(function(s) { return s.trim().toLowerCase(); });
    }
    return String(ans).toLowerCase().trim();
}

function checkAnswer(q, userAns) {
    var correct = q.answer;
    if (Array.isArray(correct)) {
        var userSet = userAns || '';
        var correctSet = correct.slice().sort().join(',').toLowerCase();
        return userSet === correctSet;
    }
    var norm = normalizeAnswer(correct);
    if (Array.isArray(norm)) {
        return norm.indexOf(userAns) !== -1;
    }
    return userAns === norm;
}

function submitPart() {
    var test = ALL_TESTS[currentTestKey];
    var part = test.parts[currentPart];
    var correct = 0, total = 0;

    var questions = document.querySelectorAll('.part-content .question');
    questions.forEach(function(qb) {
        qb.classList.remove('answered-correct', 'answered-wrong');
        var icon = qb.querySelector('.result-icon');
        if (icon) { icon.textContent = ''; icon.className = 'result-icon'; }
        var info = qb.querySelector('.answer-info');
        if (info) info.remove();
    });

    part.questions.forEach(function(q, i) {
        total++;
        var userAns = getUserAnswer(q);
        var isCorrect = checkAnswer(q, userAns);
        if (isCorrect) correct++;

        var qb = questions[i];
        if (qb) {
            qb.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
            var icon = qb.querySelector('.result-icon');
            if (icon) {
                icon.textContent = isCorrect ? '\u2713' : '\u2717';
                icon.className = 'result-icon ' + (isCorrect ? 'correct' : 'wrong');
            }
        }
    });

    // Save part score
    if (!partScores[currentTestKey]) partScores[currentTestKey] = {};
    partScores[currentTestKey][currentPart] = { correct: correct, total: total };

    submitted = true;
    var scoreBar = document.getElementById('scoreBar' + currentPart);
    scoreBar.style.display = 'block';
    document.getElementById('scoreText' + currentPart).textContent = correct + ' / ' + total;

    var band = getBandScore(correct);
    var badge = document.getElementById('bandBadge' + currentPart);
    badge.style.display = 'inline-block';
    badge.textContent = 'Band ' + band.toFixed(1);

    // Update overall score
    updateOverallScore();
}

function updateOverallScore() {
    var scores = partScores[currentTestKey] || {};
    var totalCorrect = 0, totalQ = 0;
    var allSubmitted = true;

    for (var p = 0; p < 4; p++) {
        var s = scores[p];
        if (s) { totalCorrect += s.correct; totalQ += s.total; }
        else { allSubmitted = false; }
    }

    var ts = document.getElementById('totalScoreBar');
    if (totalQ === 0) { ts.style.display = 'none'; return; }
    ts.style.display = 'block';

    // Part score chips
    var row = document.getElementById('partScoreRow');
    row.innerHTML = '';
    for (var p = 0; p < 4; p++) {
        var s = scores[p];
        if (s) {
            row.innerHTML += '<span class="part-score-chip">Part ' + (p+1) + ': ' + s.correct + '/' + s.total + ' (Band ' + getBandScore(s.correct).toFixed(1) + ')</span>';
        } else {
            row.innerHTML += '<span class="part-score-chip pending">Part ' + (p+1) + ': not submitted</span>';
        }
    }

    document.getElementById('totalScoreText').textContent = totalCorrect + ' / ' + totalQ + ' total';
    var bandBadge = document.getElementById('totalBandBadge');
    if (allSubmitted) {
        bandBadge.style.display = 'inline-block';
        bandBadge.textContent = 'Overall Band: ' + getBandScore(totalCorrect).toFixed(1);
    } else {
        bandBadge.style.display = 'none';
    }
}

function showAnswers() {
    var test = ALL_TESTS[currentTestKey];
    var part = test.parts[currentPart];
    var questions = document.querySelectorAll('.part-content .question');
    part.questions.forEach(function(q, i) {
        var qb = questions[i];
        if (!qb) return;
        var header = qb.querySelector('.q-header');
        var info = header.querySelector('.answer-info');
        if (info) info.remove();
        info = document.createElement('span');
        info.className = 'answer-info';
        var ans = Array.isArray(q.answer) ? q.answer.join(', ') : q.answer;
        info.style.cssText = 'font-size:0.8rem;color:#059669;font-weight:600;margin-left:8px;white-space:nowrap;';
        info.textContent = 'Answer: ' + ans;
        header.appendChild(info);
    });
}

function clearPart() {
    var inputs = document.querySelectorAll('.part-content input');
    inputs.forEach(function(inp) {
        if (inp.type === 'checkbox' || inp.type === 'radio') inp.checked = false;
        else inp.value = '';
    });
    document.getElementById('scoreBar' + currentPart).style.display = 'none';
    document.getElementById('bandBadge' + currentPart).style.display = 'none';
    submitted = false;
    var questions = document.querySelectorAll('.part-content .question');
    questions.forEach(function(qb) {
        qb.classList.remove('answered-correct', 'answered-wrong');
        var icon = qb.querySelector('.result-icon');
        if (icon) { icon.textContent = ''; icon.className = 'result-icon'; }
        var info = qb.querySelector('.answer-info');
        if (info) info.remove();
    });
    // Clear part score
    if (partScores[currentTestKey]) delete partScores[currentTestKey][currentPart];
    updateOverallScore();
}

// ============ BOOKMARKS PAGE ============
function renderBookmarks() {
    var bm = getBookmarks();
    var keys = Object.keys(bm);
    var html = '<div class="panel"><div class="panel-header"><h2>&#11088; My Favorites</h2><span style="color:#888;font-size:0.85rem">' + keys.length + ' questions</span></div><div class="panel-body">';

    if (keys.length === 0) {
        html += '<p style="color:#999;text-align:center;padding:40px">No bookmarked questions yet. Click the &#9734; next to any question to add it.</p>';
    } else {
        keys.forEach(function(k) {
            var parts = k.split('_');
            var testKey = parts[0];
            var partIdx = parseInt(parts[1]);
            var qid = parts[2];
            var test = ALL_TESTS[testKey];
            if (!test) return;
            var part = test.parts[partIdx];
            if (!part) return;
            var q = part.questions.find(function(x) { return String(x.id) === qid; });
            if (!q) return;
            html += '<div class="question" style="position:relative">';
            html += '<button class="star-btn starred" onclick="removeBookmark(\'' + k + '\')">&#9733;</button>';
            html += '<div class="q-header"><div class="q-num">' + q.id + '</div>';
            html += '<div class="q-body"><div class="q-text">' + q.question_text + '</div>';
            html += '<div style="font-size:0.8rem;color:#888;margin-top:4px">' + test.title + ' &middot; Part ' + part.part + ': ' + part.title + '</div>';
            html += '<div style="font-size:0.8rem;color:#059669;margin-top:2px">Answer: ' + (Array.isArray(q.answer)?q.answer.join(', '):q.answer) + '</div>';
            html += '</div></div></div>';
        });
    }
    html += '</div></div>';
    document.getElementById('mainContainer').innerHTML = html;
}

function removeBookmark(key) {
    var bm = getBookmarks();
    delete bm[key];
    setBookmarks(bm);
    toast('Removed from favorites');
    renderBookmarks();
    updateNavCounts();
}

// ============ VOCAB PAGE ============
function renderVocabPanel() {
    var vocab = getVocab();
    var html = '<div class="panel"><div class="panel-header"><h2>&#128218; Word Bank</h2><span style="color:#888;font-size:0.85rem">' + vocab.length + ' words</span></div><div class="panel-body">';

    if (vocab.length === 0) {
        html += '<p style="color:#999;text-align:center;padding:40px">No words yet. Click any highlighted word in the questions to add it here.</p>';
    } else {
        html += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
        vocab.forEach(function(w, i) {
            html += '<span class="word-chip">' + w + ' <span class="del-word" onclick="removeVocab(' + i + ')" title="Delete">&times;</span></span>';
        });
        html += '</div>';
        html += '<button class="btn btn-clear" style="margin-top:16px" onclick="clearVocab()">Clear All</button>';
    }
    html += '</div></div>';
    document.getElementById('mainContainer').innerHTML = html;
}

function removeVocab(idx) {
    var vocab = getVocab();
    var removed = vocab[idx];
    vocab.splice(idx, 1);
    setVocab(vocab);
    toast('Removed "' + removed + '"');
    renderVocabPanel();
    updateNavCounts();
}

function clearVocab() {
    if (confirm('Clear all words from word bank?')) {
        setVocab([]);
        toast('Word bank cleared');
        renderVocabPanel();
        updateNavCounts();
    }
}

// ============ WRITING PAGE ============
function renderWriting() {
    var html = '';
    // Task 1
    html += '<div class="template-card"><div class="panel-header"><h2>&#9999;&#65039; Task 1: Graph/Chart Description</h2></div><div class="panel-body">';
    html += '<div class="step"><h4>1. Introduction (1 sentence)</h4><p>Paraphrase the question statement. Use synonyms: <em>shows &rarr; illustrates/depicts</em>, <em>chart &rarr; bar chart/line graph</em>, <em>from...to... &rarr; between...and...</em></p></div>';
    html += '<div class="step"><h4>2. Overview (2 sentences)</h4><p>Describe the <strong>overall trend</strong> or the <strong>most striking features</strong>. Do NOT include specific data here. Use: <em>Overall, it is clear that... / In general, ... / The most noticeable feature is...</em></p></div>';
    html += '<div class="step"><h4>3. Body Paragraph 1 (3-4 sentences)</h4><p>Describe the first key detail with specific numbers. Group similar data together. Use comparison language: <em>similarly, likewise, in contrast, whereas, while</em>.</p></div>';
    html += '<div class="step"><h4>4. Body Paragraph 2 (3-4 sentences)</h4><p>Describe the remaining key details. End with the most interesting or surprising finding. Avoid introducing new categories in the conclusion.</p></div>';
    html += '<div style="margin-top:12px;padding:10px;background:#fefce8;border-radius:8px;font-size:0.85rem;color:#92400e"><strong>Useful phrases:</strong> experienced a sharp rise &middot; fell dramatically &middot; remained relatively stable &middot; peaked at &middot; followed by a gradual decline &middot; accounted for X% &middot; stood at &middot; saw a significant increase</div>';
    html += '</div></div>';

    // Task 2
    html += '<div class="template-card"><div class="panel-header"><h2>&#9999;&#65039; Task 2: Opinion / Discussion Essay</h2></div><div class="panel-body">';
    html += '<div class="step"><h4>1. Introduction (2-3 sentences)</h4><p><strong>Hook:</strong> Introduce the general topic background.<br><strong>Thesis:</strong> State your position clearly, or outline what the essay will discuss.<br>Pattern: <em>It is often argued that... / In recent years, there has been growing concern about... / This essay will examine both sides before reaching a conclusion.</em></p></div>';
    html += '<div class="step"><h4>2. Body Paragraph 1 — First Argument (4-5 sentences)</h4><p><strong>Topic sentence:</strong> State your first main point.<br><strong>Explanation:</strong> Elaborate on the point (1-2 sentences).<br><strong>Example:</strong> Give a concrete example (e.g., <em>For instance, research by X University found that...</em>).<br><strong>Link:</strong> Connect back to the question.</p></div>';
    html += '<div class="step"><h4>3. Body Paragraph 2 — Second Argument (4-5 sentences)</h4><p>Same structure as Body 1 but with a different angle. If it is a <em>discuss both views</em> essay, present the opposing view here. Use contrast markers: <em>On the other hand, However, Nevertheless.</em></p></div>';
    html += '<div class="step"><h4>4. Conclusion (2-3 sentences)</h4><p><strong>Summarize</strong> your main arguments (do NOT introduce new ideas).<br><strong>Restate</strong> your position in different words.<br>Pattern: <em>In conclusion, although there are valid arguments on both sides, I believe that... / To sum up, while X has some merits, the benefits of Y are more significant.</em></p></div>';
    html += '<div style="margin-top:12px;padding:10px;background:#fefce8;border-radius:8px;font-size:0.85rem;color:#92400e"><strong>Cohesive devices:</strong> Firstly, Furthermore, Moreover, In addition &middot; On the other hand, Conversely &middot; As a result, Consequently, Therefore &middot; For instance, To illustrate, A case in point is</div>';
    html += '</div></div>';

    document.getElementById('mainContainer').innerHTML = html;
}
