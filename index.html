e", "In the food village"], "answer": 2}]}]}, "reading": {"duration": 60, "passage": "Ocean Cleanup Technologies: Promise and Limitations\n\nThe growing crisis of ocean plastic pollution has spurred a wave of technological innovation aimed at cleaning up the world's seas. An estimated 11 million metric tons of plastic enter the oceans each year, a figure projected to nearly triple by 2040 without significant intervention. In response, engineers and entrepreneurs have developed a range of technologies, from massive floating barriers to microscopic nanobots.\n\nThe most prominent of these initiatives is The Ocean Cleanup, a Dutch non-profit founded by Boyan Slat. Its approach uses a 600-metre-long U-shaped floating barrier that moves with ocean currents, concentrating plastic debris for collection by support vessels. The organisation claims its System 03 can clean an area the size of a football field every five seconds. In 2023, it began operations in the Great Pacific Garbage Patch, an accumulation zone spanning 1.6 million square kilometres.\n\nSmaller-scale technologies have also emerged. The Seabin, developed by Australian surfers, is a floating rubbish bin that skims the surface of marinas and harbours, capturing plastic, oil, and detergents. Interceptor devices deployed at river mouths aim to stop plastic before it reaches the ocean, addressing the fact that 80 percent of ocean plastic originates from land-based sources via rivers.\n\nHowever, critics argue that these technologies, while valuable, risk distracting from the fundamental solution: reducing plastic production and consumption. Cleanup technologies capture only a fraction of the plastic in the ocean, and much of it is microplastic that cannot be easily recovered. Environmental scientists warn that the energy and resources invested in cleanup might be better directed toward upstream solutions such as improved waste management infrastructure in developing countries.", "questions": [{"q": "How much plastic enters the oceans annually?", "options": ["8 million tons", "11 million tons", "14 million tons", "20 million tons"], "answer": 1}, {"q": "Who founded The Ocean Cleanup?", "options": ["Boyan Slat", "Bill Gates", "Elon Musk", "Richard Branson"], "answer": 0}, {"q": "How large is the Great Pacific Garbage Patch?", "options": ["1.2 million sq km", "1.6 million sq km", "2.0 million sq km", "2.5 million sq km"], "answer": 1}, {"q": "What percentage of ocean plastic comes from rivers?", "options": ["60%", "70%", "80%", "90%"], "answer": 2}, {"q": "What is the critics' main argument?", "options": ["Cleanup is too cheap", "Focus should be on reducing plastic production", "Technology is ineffective", "Oceans will clean themselves"], "answer": 1}]}, "writing": {"duration": 60, "task1": {"prompt": "The line graph below shows the number of visitors to three museums in London from 2010 to 2020.", "data": "Year | British Museum | Science Museum | V&A\n2010 | 5.8m | 2.7m | 2.3m\n2013 | 6.7m | 3.3m | 3.2m\n2016 | 6.4m | 3.0m | 3.8m\n2019 | 6.2m | 3.2m | 4.0m\n2020 | 1.3m | 0.6m | 0.9m", "minWords": 150, "sample": "The line graph illustrates the number of visitors to three major London museums—the British Museum, the Science Museum, and the Victoria and Albert Museum—between 2010 and 2020.\n\nOverall, all three museums experienced a gradual increase in visitor numbers until 2019, followed by a dramatic decline in 2020, likely due to the pandemic.\n\nThe British Museum consistently attracted the most visitors throughout the period, starting at 5.8 million in 2010, peaking at 6.7 million in 2013, and then gradually declining to 6.2 million by 2019 before plummeting to just 1.3 million in 2020.\n\nThe Science Museum started lower at 2.7 million, rose to 3.3 million by 2013, and fluctuated around 3 million until 2019 before dropping to 0.6 million. The V&A showed the most consistent growth among the three, rising from 2.3 million in 2010 to a peak of 4.0 million in 2019, nearly overtaking the Science Museum, before falling to 0.9 million in 2020."}, "task2": {"prompt": "Some people think that the government should provide free housing for those who cannot afford it. Others believe that this is not the government's responsibility. Discuss both views and give your opinion.", "minWords": 250, "sample": "Housing is a fundamental human need, yet in many countries, a significant portion of the population struggles to afford adequate accommodation. Whether governments should provide free housing to those in need is a contentious issue that touches on questions of social justice, economic feasibility, and the proper role of the state.\n\nAdvocates of government-provided housing argue that shelter is a basic right, not a privilege. In a civilised society, they contend, no one should be forced to sleep on the streets. Furthermore, providing stable housing can generate long-term savings for the state by reducing expenditure on emergency healthcare, policing, and other crisis services. Countries such as Finland have demonstrated the effectiveness of the 'Housing First' approach, which provides permanent housing to homeless individuals without preconditions, resulting in significant reductions in homelessness and associated social costs.\n\nOpponents, however, raise valid concerns about cost and dependency. Building and maintaining public housing requires substantial government expenditure that must be funded through taxation. There is also the argument that free housing might create a disincentive to work, potentially trapping people in dependency rather than empowering them toward self-sufficiency.\n\nIn my view, while the government should not necessarily provide free housing to everyone who cannot afford it, it has a clear responsibility to ensure that no one is left without shelter. A tiered approach—providing emergency housing for the most vulnerable while subsidising affordable housing for low-income families—strikes the right balance between compassion and fiscal responsibility."}}, "speaking": {"parts": [{"part": "Part 1", "topic": "Introduction & Food", "questions": ["What is your favourite food?", "Do you enjoy cooking?", "How often do you eat out?", "What is a traditional dish from your country?"]}, {"part": "Part 2", "topic": "Describe a meal you enjoyed", "cue": "You should say: Where you ate it, Who you were with, What you ate, And explain why you enjoyed it", "time": 120}, {"part": "Part 3", "topic": "Discussion · Food & Culture", "questions": ["How has food culture changed in your country?", "Do you think people are more health-conscious about food now?", "What role does food play in celebrations?", "Should schools teach children about nutrition?"]}]}}, {"id": "c20t2", "year": 2025, "name": "剑桥雅思 20 · Test 2", "listening": {"duration": 30, "sections": [{"title": "Section 1 · 酒店预订", "audio": "I'd like to book a room for two nights from the 10th of December. A double room is available at 120 pounds per night, including breakfast. Total comes to 240 pounds. Could I have your name? Susan Taylor, T-A-Y-L-O-R. A credit card is required for the reservation. Check-in is from 2 PM. The hotel is at 15 Victoria Road, near the central station. Your reservation number is HB7756.", "questions": [{"q": "The stay is for ______ nights.", "type": "fill", "answer": "two"}, {"q": "The room rate is ______ pounds per night.", "type": "fill", "answer": "120"}, {"q": "The guest's surname is ______.", "type": "fill", "answer": "Taylor"}, {"q": "Check-in time is from ______ PM.", "type": "fill", "answer": "2"}, {"q": "The reservation number is ______.", "type": "fill", "answer": "HB7756"}]}, {"title": "Section 2 · 企业培训日安排", "audio": "Good morning everyone. Here is the schedule for today's company training day. We will start at 9 AM with a welcome address from the CEO in the main conference room. At 9:30, we split into three groups. Group A will attend the Communication Skills workshop in Room 201, Group B goes to the Leadership Development session in Room 202, and Group C has the IT Security briefing in the IT Lab. Morning tea break is at 11 AM for 30 minutes in the staff canteen. From 11:30 to 1 PM, we continue with the second round of workshops where groups rotate. Lunch is from 1 PM to 2 PM, and we have arranged for catering from the Italian restaurant downstairs. The afternoon session from 2 PM to 4 PM is the team-building activity in the park across the road, weather permitting. If it rains, we will use the sports hall instead.", "questions": [{"q": "What time does the CEO's welcome address begin?", "options": ["8:30 AM", "9:00 AM", "9:30 AM", "10:00 AM"], "answer": 1}, {"q": "Where is the Communication Skills workshop?", "options": ["Room 201", "Room 202", "IT Lab", "Main conference room"], "answer": 0}, {"q": "How long is the morning tea break?", "options": ["15 minutes", "20 minutes", "30 minutes", "45 minutes"], "answer": 2}, {"q": "Where is lunch catered from?", "options": ["Chinese restaurant", "Italian restaurant", "French bakery", "Staff canteen"], "answer": 1}, {"q": "Where is the team-building activity if it rains?", "options": ["Conference room", "Sports hall", "IT Lab", "It is cancelled"], "answer": 1}]}]}, "reading": {"duration": 60, "passage": "The Economics of Renewable Energy Transition\n\nThe global transition from fossil fuels to renewable energy represents one of the most significant economic transformations in modern history. While the environmental imperative is clear, the economic dimensions of this transition are complex and multifaceted, involving questions of cost, employment, energy security, and international competitiveness.\n\nThe economics of renewables have shifted dramatically over the past decade. The levelised cost of electricity from solar photovoltaics has fallen by approximately 89 percent since 2010, while onshore wind costs have dropped by 70 percent, according to the International Renewable Energy Agency. In many parts of the world, building new renewable capacity is now cheaper than operating existing coal plants.\n\nEmployment effects have been a central focus of the transition debate. The renewable energy sector employed approximately 13.7 million people globally in 2023, up from 7.3 million in 2012. Solar photovoltaic installations account for the largest share of these jobs, followed by bioenergy and hydropower. However, the transition also involves substantial job displacement in fossil fuel industries, creating a need for 'just transition' policies that support affected workers and communities.\n\nEnergy security considerations have gained new urgency following the geopolitical disruptions of recent years. Countries heavily dependent on imported fossil fuels have faced severe price volatility and supply uncertainties. Renewables, by contrast, offer the prospect of domestic energy production that is insulated from international market fluctuations, though intermittency challenges require investment in storage and grid infrastructure.", "questions": [{"q": "By how much have solar PV costs fallen since 2010?", "options": ["70%", "80%", "89%", "95%"], "answer": 2}, {"q": "How many people did the renewable energy sector employ in 2023?", "options": ["7.3 million", "10.2 million", "13.7 million", "15.5 million"], "answer": 2}, {"q": "What is the 'just transition' about?", "options": ["Environmental protection", "Supporting displaced fossil fuel workers", "International trade", "Technology transfer"], "answer": 1}, {"q": "What challenge do renewables face regarding energy security?", "options": ["High fuel costs", "Intermittency issues", "Lack of technology", "Poor management"], "answer": 1}, {"q": "Which renewable sector has the most jobs?", "options": ["Wind energy", "Bioenergy", "Solar PV", "Hydropower"], "answer": 2}]}, "writing": {"duration": 60, "task1": {"prompt": "The pie charts below show the energy consumption by source in a country in 2000 and 2023.", "data": "2000: Coal 38%, Oil 32%, Gas 18%, Nuclear 8%, Renewables 4%\n2023: Coal 15%, Oil 28%, Gas 25%, Nuclear 12%, Renewables 20%", "minWords": 150, "sample": "The pie charts compare the distribution of energy consumption across five sources in a particular country between 2000 and 2023.\n\nOverall, the country's energy mix diversified significantly over the 23-year period, with a dramatic decline in coal usage offset by substantial growth in renewables and natural gas.\n\nIn 2000, coal dominated the energy landscape at 38%, followed by oil at 32%. Together, these two fossil fuels accounted for 70% of all energy consumption. Gas contributed 18%, while nuclear and renewables made up just 8% and 4% respectively.\n\nBy 2023, the picture had transformed considerably. Coal fell sharply to just 15%, a decrease of 23 percentage points. Oil also declined to 28%, though more moderately. In contrast, gas consumption rose to 25%, nuclear energy increased to 12%, and renewables experienced the most dramatic growth, surging from 4% to 20%.\n\nThis shift represents a clear movement away from the most carbon-intensive fossil fuels toward cleaner energy sources, with renewables showing the most impressive expansion over the period."}, "task2": {"prompt": "Many people believe that the increasing use of modern technology in the workplace is creating more problems than it solves. To what extent do you agree or disagree?", "minWords": 250, "sample": "Modern technology has fundamentally reshaped the workplace, from the tools we use to the ways we communicate and collaborate. While some argue that this technological integration has created more problems than it has solved, I largely disagree with this assessment, believing that the benefits significantly outweigh the drawbacks when technology is implemented thoughtfully.\n\nOn the positive side, technology has dramatically increased workplace productivity and efficiency. Automation of routine tasks has freed workers to focus on higher-value activities that require creativity and critical thinking. Communication tools such as instant messaging and video conferencing have enabled seamless collaboration across time zones and geographies, a capability that proved invaluable during the pandemic and continues to support flexible working arrangements.\n\nHowever, it would be naive to dismiss the genuine problems that workplace technology can create. The blurring of boundaries between work and personal life, facilitated by constant connectivity, has contributed to increased stress and burnout among many workers. The expectation of immediate responses to emails and messages can fragment attention and reduce deep work. Additionally, the rapid pace of technological change can leave some workers feeling deskilled or obsolete.\n\nIn my view, these problems are not inherent to the technology itself but rather stem from how it is implemented and managed. Organisations that establish clear policies around after-hours communication, provide adequate training, and involve employees in technology decisions tend to experience fewer negative effects. The solution is not to reject workplace technology but to use it more intelligently."}}, "speaking": {"parts": [{"part": "Part 1", "topic": "Introduction & Sports", "questions": ["Do you play any sports?", "How often do you exercise?", "What sports are popular in your country?", "Did you enjoy PE lessons at school?"]}, {"part": "Part 2", "topic": "Describe a sports event you watched", "cue": "You should say: What event it was, Where you watched it, Who you watched it with, And explain why you remember it", "time": 120}, {"part": "Part 3", "topic": "Discussion · Sports & Society", "questions": ["Why are some sports more popular than others?", "Do professional athletes have a responsibility to be role models?", "How has technology changed sports?", "Should governments invest in sports facilities?"]}]}}, {"id": "c21t1", "year": 2025, "name": "剑桥雅思 21 · Test 1", "listening": {"duration": 30, "sections": [{"title": "Section 1 · 诊所预约", "audio": "Good afternoon, I'd like to make an appointment with Dr. Foster. We have availability on Wednesday the 17th at 10:30 AM. Your name is Robert King, K-I-N-G. Your date of birth is 3rd July 1985. Is this a new problem? Yes, I've had a sore throat for three days. Your NHS number please. It's 4837 291 065. Please arrive 10 minutes before your appointment.", "questions": [{"q": "The appointment is with Dr. ______.", "type": "fill", "answer": "Foster"}, {"q": "The date is Wednesday the ______.", "type": "fill", "answer": "17th"}, {"q": "The patient's surname is ______.", "type": "fill", "answer": "King"}, {"q": "The patient has had a sore throat for ______ days.", "type": "fill", "answer": "three"}, {"q": "The NHS number is ______.", "type": "fill", "answer": "4837 291 065"}]}, {"title": "Section 2 · 社区中心活动", "audio": "I would like to tell you about the activities we are offering at the community centre this autumn. Our most popular programme is the Art for All workshop, which runs every Tuesday morning from 10 AM to noon. No previous experience is necessary, and all materials are provided free of charge. For those interested in fitness, we have introduced a new gentle yoga class on Thursday afternoons from 2 PM to 3 PM, specifically designed for older adults. On Saturday mornings, we host a community breakfast from 9 AM to 11 AM, where for just 3 pounds you can enjoy a full cooked breakfast and meet your neighbours. We also have a book club that meets on the first Monday of each month at 7 PM. This month's book is 'The Midnight Library' by Matt Haig. Finally, our computer skills drop-in session runs on Wednesday afternoons where volunteers provide one-to-one help with smartphones, tablets, and laptops.", "questions": [{"q": "When does the Art for All workshop take place?", "options": ["Monday morning", "Tuesday morning", "Wednesday morning", "Thursday morning"], "answer": 1}, {"q": "What time does the yoga class start?", "options": ["1 PM", "2 PM", "3 PM", "4 PM"], "answer": 1}, {"q": "How much does the community breakfast cost?", "options": ["2 pounds", "3 pounds", "4 pounds", "It is free"], "answer": 1}, {"q": "When does the book club meet?", "options": ["First Monday of the month", "Second Monday", "Last Monday", "Every Monday"], "answer": 0}, {"q": "Which book is the book club reading this month?", "options": ["The Silent Patient", "The Midnight Library", "The Thursday Murder Club", "Normal People"], "answer": 1}]}]}, "reading": {"duration": 60, "passage": "The Circular Economy: Beyond Recycling\n\nThe concept of a circular economy has gained significant traction in recent years as an alternative to the traditional linear economic model of 'take, make, dispose'. In a circular economy, resources are kept in use for as long as possible, extracting maximum value before recovering and regenerating products and materials at the end of their service life.\n\nThe environmental case for circularity is compelling. The Ellen MacArthur Foundation estimates that adopting circular economy principles in just five key sectors—cement, aluminium, steel, plastics, and food—could eliminate almost half of the remaining emissions from the production of goods, equivalent to 9.3 billion tonnes of CO2 by 2050. This would be roughly equivalent to cutting all current transport emissions to zero.\n\nBusinesses are beginning to embrace circular principles for clear economic reasons. The volatility of raw material prices, supply chain disruptions, and growing consumer demand for sustainable products have made circularity an increasingly attractive business strategy. Companies like Philips have shifted from selling lighting products to selling 'light as a service', retaining ownership of the physical equipment and ensuring its recovery and refurbishment.\n\nHowever, the transition faces significant obstacles. Current economic systems are optimised for linear production, with subsidies, tax structures, and infrastructure all favouring the extraction of virgin materials over reuse and recycling. Additionally, many products were not designed with circularity in mind, making disassembly and material recovery difficult and expensive.\n\nPerhaps the most profound challenge is cultural. Consumer culture is built on novelty and disposability, and shifting to a mindset that values durability, repairability, and sharing represents a fundamental change in how people relate to the material world.", "questions": [{"q": "What is the traditional economic model referred to as?", "options": ["Circular model", "Linear model of take-make-dispose", "Sharing economy", "Sustainable model"], "answer": 1}, {"q": "How much CO2 could circular principles eliminate by 2050?", "options": ["5.3 billion tonnes", "7.3 billion tonnes", "9.3 billion tonnes", "11.3 billion tonnes"], "answer": 2}, {"q": "What approach has Philips adopted?", "options": ["Selling cheaper bulbs", "Selling light as a service", "Reducing production", "Moving manufacturing overseas"], "answer": 1}, {"q": "What makes disassembly difficult for many products?", "options": ["High labour costs", "Products not designed for circularity", "Lack of technology", "Government regulations"], "answer": 1}, {"q": "What is identified as the most profound challenge?", "options": ["Economic systems", "Product design", "Cultural mindset of disposability", "Lack of infrastructure"], "answer": 2}]}, "writing": {"duration": 60, "task1": {"prompt": "The table below shows the results of a survey about people's reasons for learning a foreign language in two different years.", "data": "Reason | 2005 | 2025\nTravel | 45% | 38%\nWork/Career | 30% | 42%\nEducation | 15% | 8%\nPersonal interest | 10% | 12%", "minWords": 150, "sample": "The table presents the results of a survey comparing the reasons people learn a foreign language, with data from 2005 and 2025.\n\nOverall, work and career overtook travel as the primary motivation for language learning over the 20-year period, while education declined significantly as a reason.\n\nIn 2005, travel was the most common reason at 45%, followed by work at 30%. Education accounted for 15%, while personal interest was the least cited reason at 10%. By 2025, the picture had shifted notably. Work and career became the leading motivation, rising to 42%, an increase of 12 percentage points. Travel, while still significant, declined to 38%.\n\nThe most dramatic change occurred in education, which fell from 15% to just 8%, nearly halving its share. Personal interest showed a modest increase to 12%. This shift likely reflects the growing importance of multilingual skills in an increasingly globalised job market, where language proficiency has become a valuable career asset rather than merely a tool for leisure or academic requirements."}, "task2": {"prompt": "Some people believe that advertising has a powerful effect on what people buy, while others think that advertising no longer influences consumer behaviour. Discuss both views and give your opinion.", "minWords": 250, "sample": "Advertising has been a cornerstone of consumer capitalism for over a century, yet its effectiveness in the digital age is increasingly debated. While some maintain that advertising remains a powerful force shaping purchasing decisions, others argue that modern consumers have developed immunity to its influence. This essay will examine both perspectives.\n\nThose who believe in advertising's continued power point to the sheer scale of investment: global advertising expenditure exceeded 700 billion dollars in 2024, suggesting that businesses continue to see it as highly effective. Modern advertising has also become far more sophisticated, using data analytics and behavioural targeting to deliver personalised messages at precisely the right moment. The rise of influencer marketing demonstrates advertising's ability to adapt to new media environments.\n\nConversely, sceptics argue that consumers today are more informed and sceptical than ever before. Online reviews, comparison websites, and social media discussions allow people to research products independently before making purchases. Ad-blocking software is used by over 40 percent of internet users globally. Furthermore, younger generations, particularly Gen Z, have demonstrated a marked preference for authentic, peer-generated content over polished advertisements.\n\nIn my opinion, the truth lies between these extremes. Advertising has not lost its power, but the nature of that power has transformed. The most effective modern advertising operates subtly, through brand building, emotional association, and social proof rather than direct persuasion. Consumers may believe they are immune, but the cumulative effect of consistent brand messaging shapes preferences in ways that are often unconscious."}}, "speaking": {"parts": [{"part": "Part 1", "topic": "Introduction & Shopping", "questions": ["Do you enjoy shopping?", "How often do you go shopping?", "Do you prefer shopping online or in stores?", "What was the last thing you bought?"]}, {"part": "Part 2", "topic": "Describe something you bought that you were happy with", "cue": "You should say: What you bought, Where you bought it, Why you chose it, And explain why you were happy with it", "time": 120}, {"part": "Part 3", "topic": "Discussion · Consumer Behaviour", "questions": ["How has shopping changed in recent years?", "Do you think advertising influences what people buy?", "Is it better to buy cheap products or invest in quality?", "What impact does online shopping have on local businesses?"]}]}}, {"id": "c21t2", "year": 2025, "name": "剑桥雅思 21 · Test 2", "listening": {"duration": 30, "sections": [{"title": "Section 1 · 夏令营报名", "audio": "I'd like to register my daughter for summer camp. Her name is Lucy White, W-H-I-T-E. She is twelve years old. We have the Adventure Camp from 20th July to 3rd August, that's two weeks. The fee is 350 pounds including meals and activities. She needs to bring a sleeping bag and waterproof jacket. The camp is at Lakewood Forest, about 40 miles from the city. The registration code is SC2024.", "questions": [{"q": "The child's surname is ______.", "type": "fill", "answer": "White"}, {"q": "She is ______ years old.", "type": "fill", "answer": "twelve"}, {"q": "The camp duration is ______ weeks.", "type": "fill", "answer": "two"}, {"q": "The total fee is ______ pounds.", "type": "fill", "answer": "350"}, {"q": "The camp is at ______ Forest.", "type": "fill", "answer": "Lakewood"}]}, {"title": "Section 2 · 环保倡议介绍", "audio": "Today I want to talk about our community's Green Living Initiative, which launched six months ago. The initiative has three main programmes. The first is our food waste reduction scheme. We distributed 2,000 kitchen caddies to households and now collect food waste separately every Monday. In just six months, we have diverted 350 tonnes of food waste from landfill. The second programme is our tree planting campaign. We set a target of planting 10,000 trees across the community, and I am delighted to say we have already reached 7,500, with the remainder to be planted this autumn. Volunteers are always welcome at our monthly planting days. The third is our sustainable transport project. We have installed 50 new electric vehicle charging points across the town and launched a bike-sharing scheme with 200 bicycles at 25 docking stations. The scheme has been hugely popular, with over 15,000 journeys made in the first three months.", "questions": [{"q": "When did the Green Living Initiative launch?", "options": ["Three months ago", "Six months ago", "Nine months ago", "One year ago"], "answer": 1}, {"q": "How many kitchen caddies were distributed?", "options": ["1,500", "2,000", "2,500", "3,000"], "answer": 1}, {"q": "How many tonnes of food waste have been diverted?", "options": ["250 tonnes", "300 tonnes", "350 tonnes", "400 tonnes"], "answer": 2}, {"q": "How many trees have been planted so far?", "options": ["5,000", "6,500", "7,500", "10,000"], "answer": 2}, {"q": "How many journeys were made on the bike scheme in the first three months?", "options": ["10,000", "12,000", "15,000", "20,000"], "answer": 2}]}]}, "reading": {"duration": 60, "passage": "The Anthropology of Digital Communities\n\nThe rise of digital platforms has given birth to new forms of human community that challenge traditional anthropological categories. Online communities, from Reddit forums to Discord servers to massive multiplayer online games, have become genuine sites of culture, complete with their own norms, languages, hierarchies, and rituals.\n\nAnthropologists studying these digital spaces have observed that they function remarkably similarly to physical communities. The concept of 'liminality', originally developed by anthropologist Victor Turner to describe the transitional phase in rites of passage, has proven useful in understanding how newcomers are socialised into online communities. New members typically undergo a period of observation and tentative participation—known as 'lurking' in internet parlance—before becoming fully integrated members with recognised status.\n\nLanguage plays a particularly important role in digital community formation. Each community develops its own lexicon of insider terms, acronyms, and references that serve both communicative and identity-marking functions. The use of these linguistic markers signals belonging and excludes outsiders, much as specialised jargon does in professional communities.\n\nHowever, digital communities also present unique characteristics that distinguish them from their physical counterparts. The absence of physical co-presence fundamentally alters the nature of social accountability. Anonymity and pseudonymity, while enabling freer expression, can also facilitate antisocial behaviour that would be constrained by face-to-face interaction. The ease of exit—simply closing a browser tab—means that community bonds, while often genuine, can be more fragile than those forged through shared physical experience.\n\nPerhaps most significantly, digital communities have demonstrated the capacity to mobilise collective action in the physical world. From political movements to charitable fundraising, online communities have repeatedly translated virtual solidarity into real-world impact.", "questions": [{"q": "What does 'lurking' refer to in online communities?", "options": ["Being banned", "Observation before participation", "Posting frequently", "Moderating content"], "answer": 1}, {"q": "Who developed the concept of 'liminality'?", "options": ["Claude Levi-Strauss", "Victor Turner", "Margaret Mead", "Bronislaw Malinowski"], "answer": 1}, {"q": "What role does language play in digital communities?", "options": ["It is unimportant", "It signals belonging and excludes outsiders", "It simplifies communication", "It replaces visual cues"], "answer": 1}, {"q": "What fundamental difference does the text identify between digital and physical communities?", "options": ["Different interests", "Absence of physical co-presence", "More members", "No rules"], "answer": 1}, {"q": "What capacity have digital communities demonstrated?", "options": ["Creating jobs", "Mobilising collective action", "Reducing screen time", "Improving education"], "answer": 1}]}, "writing": {"duration": 60, "task1": {"prompt": "The bar chart below shows the percentage of men and women in different age groups who participated in volunteer work in a European country in 2023.", "data": "Age Group | Men | Women\n18-25 | 22% | 32%\n26-40 | 18% | 28%\n41-55 | 24% | 35%\n56-70 | 30% | 38%\n71+ | 25% | 20%", "minWords": 150, "sample": "The bar chart illustrates the proportion of males and females across five age groups who engaged in volunteer work in a European country during 2023.\n\nOverall, women participated in volunteering at higher rates than men across most age groups, with the notable exception of the oldest category where the pattern reversed.\n\nAmong the youngest group (18-25), 32% of women volunteered compared to 22% of men, a gap of 10 percentage points. This pattern continued in the 26-40 age bracket, where female participation stood at 28% versus 18% for males. The gender gap widened further in the 41-55 group, with 35% of women and 24% of men volunteering.\n\nThe 56-70 age group showed the highest participation rates for both genders, with 38% of women and 30% of men engaged in volunteer work. However, a striking reversal occurred in the 71-plus category: male participation rose to 25% while female participation dropped sharply to 20%, making this the only age group where men volunteered at a higher rate than women. This pattern may reflect differing retirement patterns and caregiving responsibilities in later life."}, "task2": {"prompt": "Some people think that all university students should study whatever they like. Others believe that they should only be allowed to study subjects that will be useful in the future, such as those related to science and technology. Discuss both views and give your opinion.", "minWords": 250, "sample": "The question of what university students should study touches on fundamental tensions between personal freedom, economic utility, and the purpose of higher education itself. While some argue that students should follow their passions regardless of practical considerations, others advocate for a more utilitarian approach focused on future economic needs.\n\nThose who support academic freedom emphasise that genuine intellectual engagement produces the best outcomes. Students who are passionate about their subjects are more likely to excel, contribute original ideas, and persist through challenges. History shows that many groundbreaking innovations emerged from seemingly 'impractical' disciplines: philosophy gave us the foundations of logic that underpin computer science, while linguistics research contributed to the development of natural language processing.\n\nMoreover, predicting which skills will be 'useful' in the future is notoriously difficult. The rapid pace of technological change means that specific technical knowledge can become obsolete quickly, while transferable skills such as critical thinking, communication, and adaptability—cultivated across all disciplines—retain enduring value.\n\nOn the other hand, pragmatists argue that societies face pressing challenges in areas like climate change, healthcare, and technological development that require specific expertise. Governments investing in higher education have a legitimate interest in ensuring that graduates can contribute to addressing these challenges.\n\nIn my view, a balanced approach is most sensible. Students should have the freedom to pursue their interests, but universities and governments should also ensure that the overall distribution of graduates across disciplines meets societal needs. This could be achieved through incentives such as scholarships in priority fields rather than through restrictions on student choice."}}, "speaking": {"parts": [{"part": "Part 1", "topic": "Introduction & Weather", "questions": ["What is the weather like today?", "Do you prefer hot or cold weather?", "Has the weather in your country changed in recent years?", "What do you like to do when the weather is good?"]}, {"part": "Part 2", "topic": "Describe an environmental problem in your country", "cue": "You should say: What the problem is, What causes it, What effects it has, And explain what could be done about it", "time": 120}, {"part": "Part 3", "topic": "Discussion · Environment", "questions": ["What are the biggest environmental challenges facing the world today?", "Do individuals have a responsibility to protect the environment?", "How can governments encourage people to be more environmentally friendly?", "Do you think the situation will improve in the future?"]}]}}];

function init() {
  if (state.theme === 'dark') document.body.classList.add('dark');
  renderTestList();
  renderModules();
  loadProgress();
  showView(null);

function renderTestList() {
  const el = document.getElementById('testList');
  el.innerHTML = TESTS.map(t =>
    `<div class="test-item ${t.id===state.currentTest?'active':''}" onclick="selectTest('${t.id}')">
      ${t.name} <span class="badge">${t.year}</span>
    </div>`
  ).join('');
}

function renderModules() {
  const el = document.getElementById('moduleList');
  const mods = ['listening','reading','writing','speaking'];
  const labels = ['听力','阅读','写作','口语'];
  el.innerHTML = mods.map((m,i) =>
    `<button class="module-btn ${m===state.currentModule?'active':''}" onclick="selectModule('${m}')">${labels[i]}</button>`
  ).join('');
}

function selectTest(id) {
  state.currentTest = id;
  state.currentModule = state.currentModule;
  renderTestList();
  loadModule();
}

function selectModule(mod) {
  state.currentModule = mod;
  renderModules();
  loadModule();
}

function getTest() { return TESTS.find(t => t.id === state.currentTest); }
function getModuleData() {
  const t = getTest();
  if (!t) return null;
  return t[state.currentModule];
}

function getQuestions() {
  const md = getModuleData();
  if (!md) return [];
  if (state.currentModule === 'listening') {
    let qs = [];
    (md.sections||[]).forEach(s => { if (s.questions) qs = qs.concat(s.questions); });
    return qs;
  }
  if (state.currentModule === 'reading') {
    return md.questions || [];
  }
  return [];
}

function getTotalQuestions() {
  if (state.currentModule === 'listening' || state.currentModule === 'reading') {
    return getQuestions().length;
  }
  return 0;
}

function loadModule() {
  stopTimer();
  const md = getModuleData();
  const mc = document.getElementById('mainContent');
  if (!md) { mc.innerHTML = '<div class="panel text-center"><p class="text-sub">数据加载中...</p></div>'; return; }

  const mod = state.currentModule;
  const key = state.currentTest + '_' + mod;
  const submitted = state.submitted[key];
  const questions = getQuestions();
  const totalQ = getTotalQuestions();

  // Hide/show answer sheet
  const asCard = document.getElementById('answerSheetCard');
  if (mod === 'listening' || mod === 'reading') {
    asCard.classList.remove('hidden');
    renderAnswerSheet(questions);
    document.getElementById('totalCount').textContent = totalQ;
  } else {
    asCard.classList.add('hidden');
  }

  if (mod === 'listening') {
    renderListening(md);
  } else if (mod === 'reading') {
    renderReading(md, questions);
  } else if (mod === 'writing') {
    renderWriting(md);
  } else if (mod === 'speaking') {
    renderSpeaking(md);
  }

  const wp=document.getElementById('welcomePanel');if(wp)wp.classList.add('hidden');

  // Start timer if exam mode and not submitted
  if (state.mode === 'exam' && !submitted && (mod==='listening'||mod==='reading')) {
    startTimer(md.duration * 60);
  }
}

function renderListening(md) {
  const mc = document.getElementById('mainContent');
  const key = state.currentTest + '_listening';
  const submitted = state.submitted[key];
  let sectionsHtml = '';

  (md.sections||[]).forEach((s, si) => {
    sectionsHtml += `<div class="panel">
      <div class="panel-header"><h2>${s.title}</h2></div>
      <div class="audio-player">
        <button class="btn btn-accent audio-play-btn" id="audioBtn${si}" onclick="toggleAudio(${si})">
          <span class="icon-play">▶</span><span class="icon-pause">⏸</span>
        </button>
        <div class="audio-progress-wrapper">
          <div class="audio-progress"><div class="audio-progress-fill" id="audioProgress${si}" style="width:0%"></div></div>
          <span class="audio-time" id="audioTime${si}">0:00</span>
        </div>
      </div>`;
    (s.questions||[]).forEach((q, qi) => {
      const globalIdx = getGlobalQIndex('listening', si, qi);
      const ansKey = key + '_' + globalIdx;
      const sel = state.answers[ansKey];
      sectionsHtml += renderQuestion(q, globalIdx, sel, submitted);
    });
    sectionsHtml += '</div>';
  });

  mc.innerHTML = `<div class="panel-header"><h2>${getTest().name} · 听力</h2>
    <span class="timer hidden" id="examTimer">--:--</span></div>` + sectionsHtml;
}

function renderReading(md, questions) {
  const mc = document.getElementById('mainContent');
  const key = state.currentTest + '_reading';
  const submitted = state.submitted[key];
  let qHtml = '';
  questions.forEach((q, i) => {
    const ansKey = key + '_' + i;
    const sel = state.answers[ansKey];
    qHtml += renderQuestion(q, i, sel, submitted);
  });
  mc.innerHTML = `<div class="panel-header"><h2>${getTest().name} · 阅读</h2>
    <span class="timer hidden" id="examTimer">--:--</span></div>
    <div class="panel"><div class="passage">${md.passage||''}</div></div>
    <div class="panel">${qHtml}</div>`;
}

function renderWriting(md) {
  const mc = document.getElementById('mainContent');
  const key = state.currentTest + '_writing';
  const submitted = state.submitted[key];

  const task1Content = state.answers[key+'_task1'] || '';
  const task2Content = state.answers[key+'_task2'] || '';

  mc.innerHTML = `<div class="panel-header"><h2>${getTest().name} · 写作</h2></div>
    <div class="panel">
      <h3 style="margin-bottom:8px;">Task 1</h3>
      <div class="writing-prompt">
        <p>${md.task1.prompt}</p>
        <pre>${md.task1.data||''}</pre>
        <p style="color:var(--sub);font-size:0.8rem;margin-top:8px;">最少 ${md.task1.minWords} 词</p>
      </div>
      <textarea class="writing-textarea" id="writingTask1" placeholder="在此输入你的 Task 1 作文..." ${submitted?'disabled':''}>${task1Content}</textarea>
      <div class="word-count" id="wc1">词数: ${countWords(task1Content)} / ${md.task1.minWords}</div>
      ${md.task1.sample ? `<button class="btn btn-sm mt-12" onclick="toggleSample('sample1')">查看范文</button>
      <div class="sample-essay" id="sample1">${escapeHtml(md.task1.sample)}</div>` : ''}
    </div>
    <div class="panel">
      <h3 style="margin-bottom:8px;">Task 2</h3>
      <div class="writing-prompt">
        <p>${md.task2.prompt}</p>
        <p style="color:var(--sub);font-size:0.8rem;margin-top:8px;">最少 ${md.task2.minWords} 词</p>
      </div>
      <textarea class="writing-textarea" id="writingTask2" placeholder="在此输入你的 Task 2 作文..." ${submitted?'disabled':''}>${task2Content}</textarea>
      <div class="word-count" id="wc2">词数: ${countWords(task2Content)} / ${md.task2.minWords}</div>
      ${md.task2.sample ? `<button class="btn btn-sm mt-12" onclick="toggleSample('sample2')">查看范文</button>
      <div class="sample-essay" id="sample2">${escapeHtml(md.task2.sample)}</div>` : ''}
    </div>
    <div class="text-center mt-16">
      <button class="btn btn-accent" onclick="saveWriting()">保存写作</button>
    </div>`;

  // Attach listeners
  document.getElementById('writingTask1').addEventListener('input', function() {
    const wc = countWords(this.value);
    document.getElementById('wc1').textContent = '词数: ' + wc + ' / ' + md.task1.minWords;
    const wcEl = document.getElementById('wc1');
    if (wc < md.task1.minWords) wcEl.classList.add('warn'); else wcEl.classList.remove('warn');
  });
  document.getElementById('writingTask2').addEventListener('input', function() {
    const wc = countWords(this.value);
    document.getElementById('wc2').textContent = '词数: ' + wc + ' / ' + md.task2.minWords;
    const wcEl = document.getElementById('wc2');
    if (wc < md.task2.minWords) wcEl.classList.add('warn'); else wcEl.classList.remove('warn');
  });
}

function renderSpeaking(md) {
  const mc = document.getElementById('mainContent');
  const parts = md.parts || [];
  let partsHtml = parts.map(p => {
    let body = '';
    if (p.part === 'Part 2') {
      body = `<div class="topic">${p.topic}</div><div class="cue">${p.cue||''}</div>
        <div class="speaking-timer" id="speakingTimer">02:00</div>
        <button class="btn btn-sm record-btn" onclick="toggleRecording()">🎤 开始录音</button>
        <div class="audio-playback" id="audioPlayback"><audio controls id="speakingAudio"></audio></div>`;
    } else {
      body = `<ul>${(p.questions||[]).map(q => `<li>${q}</li>`).join('')}</ul>`;
    }
    return `<div class="speaking-card"><h3>${p.part}: ${p.topic||''}</h3>${body}</div>`;
  }).join('');

  mc.innerHTML = `<div class="panel-header"><h2>${getTest().name} · 口语</h2></div>${partsHtml}`;
}

function renderQuestion(q, qIdx, selected, submitted) {
  if (q.type === 'fill') {
    var val = (typeof selected === 'string') ? selected : '';
    var h = '<div class="question"><span class="q-num">Q' + (qIdx+1) + '.</span><span class="q-text">' + q.q + '</span>';
    if (submitted) {
      var isCorrect = val.toLowerCase().trim() === (q.answer||'').toLowerCase().trim();
      var disabledAttr = state.mode === 'exam' ? ' disabled' : '';
      h += '<div class="fill-input-wrapper"><input type="text" class="fill-input ' + (isCorrect?'fill-correct':'fill-wrong') + '" value="' + escapeHtml(val) + '"' + disabledAttr + '>' +
        (isCorrect ? '<span class="fill-mark-correct">✓ 正确</span>' : '<span class="fill-answer-label">正确答案: ' + escapeHtml(q.answer) + '</span>') +
        '</div>';
    } else {
      h += '<div class="fill-input-wrapper"><input type="text" class="fill-input" id="fillInput_' + qIdx + '" value="' + escapeHtml(val) + '" placeholder="在此输入答案..." onkeydown="if(event.key===\'Enter\')fillAnswer(' + qIdx + ')">' +
        '<button class="btn btn-sm btn-primary" onclick="fillAnswer(' + qIdx + ')">确认</button></div>';
    }
    h += '</div>';
    return h;
  }

  var letters = ['A','B','C','D','E'];
  var optsHtml = '';
  (q.options||[]).forEach(function(opt, oi) {
    var cls = 'option';
    if (!submitted) {
      if (selected === oi) cls += ' selected';
    } else {
      if (oi === q.answer) cls += ' correct';
      else if (selected === oi && selected !== q.answer) cls += ' wrong';
    }
    optsHtml += '<div class="' + cls + '" onclick="' + (submitted?'':'selectAnswer(\''+qIdx+'\','+oi+')') + '"><span class="letter">' + letters[oi] + '</span> <span>' + opt + '</span></div>';
  });

  return '<div class="question"><span class="q-num">Q' + (qIdx+1) + '.</span><span class="q-text">' + q.q + '</span><div class="options">' + optsHtml + '</div></div>';
}

function selectAnswer(qIdx, optionIdx) {
  const key = state.currentTest + '_' + state.currentModule + '_' + qIdx;
  if (state.submitted[state.currentTest + '_' + state.currentModule]) return;
  state.answers[key] = optionIdx;
  saveProgress();
  renderAnswerSheet(getQuestions());
  loadModule(); // re-render to show selection
}

function fillAnswer(qIdx) {
  var key = state.currentTest + '_' + state.currentModule + '_' + qIdx;
  if (state.submitted[state.currentTest + '_' + state.currentModule]) return;
  var input = document.getElementById('fillInput_' + qIdx);
  if (!input) return;
  state.answers[key] = input.value.trim();
  saveProgress();
  renderAnswerSheet(getQuestions());
  loadModule();
}


function getGlobalQIndex(mod, sectionIdx, qIdx) {
  if (mod !== 'listening') return qIdx;
  const md = getModuleData();
  let offset = 0;
  for (let i = 0; i < sectionIdx; i++) {
    offset += (md.sections[i].questions||[]).length;
  }
  return offset + qIdx;
}

function renderAnswerSheet(questions) {
  const el = document.getElementById('answerSheet');
  const key = state.currentTest + '_' + state.currentModule;
  let answered = 0;
  let html = '';
  questions.forEach((q, i) => {
    const ansKey = key + '_' + i;
    const sel = state.answers[ansKey];
    let cls = 'answer-dot';
    if (sel !== undefined) { cls += ' answered'; answered++; }
    if (state.submitted[key]) {
      if (sel === q.answer) cls += ' correct';
      else cls += ' wrong';
    }
    html += `<span class="${cls}" title="Q${i+1}"></span>`;
  });
  el.innerHTML = html;
  document.getElementById('answeredCount').textContent = answered;
  const total = questions.length;
  document.getElementById('progressBar').style.width = total ? (answered/total*100)+'%' : '0%';
}

function submitModule() {
  const mod = state.currentModule;
  if (mod !== 'listening' && mod !== 'reading') { toast('该模块无需提交'); return; }
  const key = state.currentTest + '_' + mod;
  const questions = getQuestions();
  let correct = 0, wrong = 0;
  questions.forEach((q, i) => {
    const ansKey = key + '_' + i;
    const sel = state.answers[ansKey];
    if (q.type === 'fill') {
      if (sel !== undefined && sel !== '' && sel.toLowerCase().trim() === (q.answer||'').toLowerCase().trim()) correct++;
      else wrong++;
    } else {
      if (sel === q.answer) correct++;
      else wrong++;
    }
  });

  state.submitted[key] = true;
  state.results[key] = { score: correct, correct, wrong, total: questions.length, timestamp: Date.now() };

  // Error book — 答错或未答均记录
  questions.forEach((q, i) => {
    const ansKey = key + '_' + i;
    const sel = state.answers[ansKey];
    const isWrong = q.type === 'fill'
      ? (sel === undefined || sel === '' || sel.toLowerCase().trim() !== (q.answer||'').toLowerCase().trim())
      : (sel === undefined || sel !== q.answer);
    if (isWrong) {
      const err = { testId: state.currentTest, module: mod, qIdx: i, question: q.q,
        yourAnswer: sel === undefined ? '（未作答）' : (q.type === 'fill' ? sel : q.options[sel]),
        correctAnswer: q.type === 'fill' ? q.answer : q.options[q.answer],
        timestamp: Date.now() };
      // 避免重复记录同一题
      const already = state.errorBook.some(e => e.testId === err.testId && e.module === err.module && e.qIdx === err.qIdx);
      if (!already) state.errorBook.push(err);
    }
  });
  localStorage.setItem('ielts-errors', JSON.stringify(state.errorBook));
  saveProgress();
  stopTimer();

  const pct = questions.length ? Math.round(correct/questions.length*100) : 0;
  document.getElementById('resultScore').textContent = correct + '/' + questions.length;
  document.getElementById('resultBand').textContent = getBandScore(correct, questions.length);
  document.getElementById('resultCorrect').textContent = correct;
  document.getElementById('resultWrong').textContent = wrong;
  document.getElementById('resultPct').textContent = pct + '%';
  document.getElementById('resultModal').classList.add('show');

  renderAnswerSheet(questions);
  loadModule();
}

function getBandScore(correct, total) {
  const eb = getBandScoreEnhanced(correct, total);
  return 'Band ' + eb.band + ' · ' + eb.comment;
}

function closeModal() { document.getElementById('resultModal').classList.remove('show'); }

function reviewAnswers() {
  closeModal();
  loadModule(); // already showing correct/wrong since submitted flag is true
}

function saveWriting() {
  const key = state.currentTest + '_writing';
  const t1 = document.getElementById('writingTask1')?.value || '';
  const t2 = document.getElementById('writingTask2')?.value || '';
  state.answers[key+'_task1'] = t1;
  state.answers[key+'_task2'] = t2;
  state.submitted[key] = true;
  state.results[key] = { task1Words: countWords(t1), task2Words: countWords(t2), timestamp: Date.now() };
  saveProgress();
  toast('写作已保存');
}

function countWords(text) {
  const trimmed = text.trim();
  if (!trimmed) return 0;
  return trimmed.split(/\s+/).length;
}

function toggleSample(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function startTimer(seconds) {
  state.timeLeft = seconds;
  const el = document.getElementById('examTimer');
  if (!el) return;
  el.classList.remove('hidden');
  updateTimerDisplay();
  state.timerId = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0) {
      stopTimer();
      submitModule();
      toast('时间到！已自动提交');
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('examTimer');
  if (!el) return;
  const m = Math.floor(state.timeLeft/60);
  const s = state.timeLeft%60;
  el.textContent = m + ':' + String(s).padStart(2,'0');
  if (state.timeLeft <= 60) el.classList.add('warn');
}

function stopTimer() {
  if (state.timerId) { clearInterval(state.timerId); state.timerId = null; }
}

function switchMode(mode) {
  state.mode = mode;
  document.getElementById('modePractice').classList.toggle('btn-primary', mode==='practice');
  document.getElementById('modeExam').classList.toggle('btn-primary', mode==='exam');
  stopTimer();
  loadModule();
  if (mode === 'exam' && !state.submitted[state.currentTest+'_'+state.currentModule]) {
    const md = getModuleData();
    if (md && md.duration) startTimer(md.duration * 60);
  }
  toast(mode==='exam' ? '已切换为模拟考试模式' : '已切换为练习模式');
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ielts-theme', state.theme);
  document.body.classList.toggle('dark', state.theme === 'dark');
}

function showView(view) {
  stopTimer();
  if (view === 'stats') showStats();
  else if (view === 'errors') showErrors();
  else { document.getElementById('welcomePanel').classList.remove('hidden'); loadWelcomeStats(); }
}

function showStats() {
  const mc = document.getElementById('mainContent');
  const wp=document.getElementById('welcomePanel');if(wp)wp.classList.add('hidden');
  document.getElementById('answerSheetCard').classList.add('hidden');

  let html = `<div class="panel-header"><h2>学习记录</h2></div>`;
  let totalCorrect = 0, totalQuestions = 0, modulesDone = 0;
  const recentResults = [];

  TESTS.forEach(t => {
    ['listening','reading','writing','speaking'].forEach(mod => {
      const key = t.id + '_' + mod;
      if (state.results[key]) {
        if (mod === 'listening' || mod === 'reading') {
          const r = state.results[key];
          totalCorrect += r.correct || 0;
          totalQuestions += r.total || 0;
          modulesDone++;
          recentResults.push({test: t.name, module: mod, score: r.correct, total: r.total,
            pct: Math.round((r.correct/r.total)*100), time: r.timestamp});
        } else if (mod === 'writing' || mod === 'speaking') {
          modulesDone++;
          recentResults.push({test: t.name, module: mod, score: '-', total: '-', pct: '-', time: state.results[key].timestamp});
        }
      }
    });
  });

  const overallPct = totalQuestions ? Math.round(totalCorrect/totalQuestions*100) : 0;
  html += `<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${modulesDone}</div><div class="stat-label">已完成模块</div></div>
    <div class="stat-card"><div class="stat-val">${totalCorrect}/${totalQuestions}</div><div class="stat-label">总正确数</div></div>
    <div class="stat-card"><div class="stat-val">${overallPct}%</div><div class="stat-label">总正确率</div></div>
    <div class="stat-card"><div class="stat-val">${state.errorBook.length}</div><div class="stat-label">错题数</div></div>
  </div>`;

  if (recentResults.length) {
    html += `<div class="panel mt-16"><h3>近期成绩</h3>`;
    recentResults.sort((a,b) => b.time - a.time).slice(0,20).forEach(r => {
      html += `<div class="error-item">
        <span>${r.test} · ${r.module==='listening'?'听力':r.module==='reading'?'阅读':r.module==='writing'?'写作':'口语'}</span>
        <span>${r.score}/${r.total} (${r.pct}%) <span class="test-ref">${new Date(r.time).toLocaleDateString('zh-CN')}</span></span>
      </div>`;
    });
    html += `</div>`;
  }

  mc.innerHTML = html;
}

function showErrors() {
  const mc = document.getElementById('mainContent');
  const wp=document.getElementById('welcomePanel');if(wp)wp.classList.add('hidden');
  document.getElementById('answerSheetCard').classList.add('hidden');

  let html = `<div class="panel-header"><h2>错题本 (${state.errorBook.length})</h2>
    ${state.errorBook.length ? '<button class="btn btn-sm" onclick="clearErrors()">清空错题本</button>' : ''}</div>`;

  if (!state.errorBook.length) {
    html += '<div class="panel text-center"><p class="text-sub">暂无错题记录，继续加油！</p></div>';
  } else {
    const testMap = {};
    TESTS.forEach(t => { testMap[t.id] = t.name; });
    const modLabels = {listening:'听力',reading:'阅读',writing:'写作',speaking:'口语'};

    state.errorBook.slice().reverse().forEach((e, i) => {
      html += `<div class="panel error-list"><div class="error-item">
        <div><strong>${e.question}</strong><br>
          <span style="color:var(--error)">你的答案: ${e.yourAnswer}</span> ·
          <span style="color:var(--success)">正确答案: ${e.correctAnswer}</span><br>
          <span class="test-ref">${testMap[e.testId]||e.testId} · ${modLabels[e.module]||e.module} · ${new Date(e.timestamp).toLocaleDateString('zh-CN')}</span>
        </div>
        <button class="btn btn-sm btn-outline" onclick="goToError('${e.testId}','${e.module}')">重做</button>
      </div></div>`;
    });
  }

  mc.innerHTML = html;
}

function goToError(testId, module) {
  state.currentTest = testId;
  state.currentModule = module;
  renderTestList();
  renderModules();
  loadModule();
}

function clearErrors() {
  state.errorBook = [];
  localStorage.setItem('ielts-errors', '[]');
  showErrors();
  toast('错题本已清空');
}

function loadWelcomeStats() {
  document.getElementById('welcomePanel').classList.remove('hidden');
  let totalCorrect = 0, totalQuestions = 0;
  TESTS.forEach(t => {
    ['listening','reading'].forEach(mod => {
      const key = t.id + '_' + mod;
      if (state.results[key]) {
        totalCorrect += state.results[key].correct || 0;
        totalQuestions += state.results[key].total || 0;
      }
    });
  });
  const pct = totalQuestions ? Math.round(totalCorrect/totalQuestions*100) : 0;
  document.getElementById('welcomeStats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${TESTS.length}</div><div class="stat-label">真题套卷</div></div>
    <div class="stat-card"><div class="stat-val">${totalCorrect}/${totalQuestions}</div><div class="stat-label">总正确数</div></div>
    <div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-label">正确率</div></div>
    <div class="stat-card"><div class="stat-val">${state.errorBook.length}</div><div class="stat-label">错题</div></div>
  `;
}

// Audio
let audioStates = {};

function toggleAudio(sectionIdx) {
  const md = getModuleData();
  if (!md || !md.sections || !md.sections[sectionIdx]) return;
  const text = md.sections[sectionIdx].audio || '';
  if (!text) { toast('无音频文本'); return; }
  if (!('speechSynthesis' in window)) { toast('浏览器不支持语音合成'); return; }

  const st = audioStates[sectionIdx];

  // Currently playing → pause
  if (st && st.playing) {
    speechSynthesis.pause();
    st.playing = false;
    updateAudioUI(sectionIdx, false);
    return;
  }

  // Paused → resume
  if (st && !st.playing && st.utterance) {
    speechSynthesis.resume();
    st.playing = true;
    updateAudioUI(sectionIdx, true);
    return;
  }

  // Start new playback: cancel all, reset UI
  speechSynthesis.cancel();
  Object.keys(audioStates).forEach(k => {
    if (audioStates[k]) { audioStates[k].playing = false; audioStates[k].utterance = null; }
    updateAudioUI(parseInt(k), false);
  });

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-GB';
  utterance.rate = 0.9;
  const totalChars = text.length;

  const newSt = { playing: true, utterance: utterance, totalChars: totalChars };
  audioStates[sectionIdx] = newSt;

  utterance.onboundary = (e) => {
    if (e.charIndex !== undefined) {
      newSt.charIndex = e.charIndex;
      updateProgress(sectionIdx, e.charIndex, totalChars);
    }
  };

  utterance.onend = () => {
    audioStates[sectionIdx] = null;
    updateAudioUI(sectionIdx, false);
    updateProgress(sectionIdx, totalChars, totalChars);
  };

  utterance.onerror = () => {
    audioStates[sectionIdx] = null;
    updateAudioUI(sectionIdx, false);
  };

  speechSynthesis.speak(utterance);
  updateAudioUI(sectionIdx, true);
}

function updateAudioUI(sectionIdx, playing) {
  const btn = document.getElementById('audioBtn' + sectionIdx);
  if (btn) {
    if (playing) btn.classList.add('playing');
    else btn.classList.remove('playing');
  }
}

function updateProgress(sectionIdx, charIdx, totalChars) {
  const fill = document.getElementById('audioProgress' + sectionIdx);
  const time = document.getElementById('audioTime' + sectionIdx);
  if (fill && totalChars > 0) {
    const pct = Math.min(100, Math.round((charIdx / totalChars) * 100));
    fill.style.width = pct + '%';
  }
  if (time && totalChars > 0) {
    // Estimate: ~150 chars per 10 seconds at rate 0.9, rough time display
    const totalSec = Math.round(totalChars / 12); // ~12 chars/sec at rate 0.9
    const curSec = Math.round(charIdx / 12);
    const min = Math.floor(curSec / 60);
    const sec = String(curSec % 60).padStart(2, '0');
    time.textContent = min + ':' + sec;
  }
}

// Recording
let mediaRecorder = null, recordedChunks = [];
function toggleRecording() {
  const btn = document.querySelector('.record-btn');
  if (!btn) return;
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 开始录音';
    return;
  }

  navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
    mediaRecorder = new MediaRecorder(stream);
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, {type:'audio/webm'});
      const url = URL.createObjectURL(blob);
      const ap = document.getElementById('audioPlayback');
      const audio = document.getElementById('speakingAudio');
      audio.src = url;
      ap.style.display = 'block';
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    btn.classList.add('recording');
    btn.innerHTML = '⏹ 停止录音';
    toast('录音中...');
  }).catch(() => toast('无法访问麦克风'));
}

// ===== Enhanced Band Score =====
function getBandScoreEnhanced(correct, total) {
  const pct = total ? correct/total : 0;
  const pct100 = Math.round(pct * 100);
  let band, comment;
  if (pct >= 0.97) { band = '9.0'; comment = 'Expert User — 接近母语水平，发挥出色！'; }
  else if (pct >= 0.93) { band = '8.5'; comment = 'Very Good User — 非常优秀，继续保持！'; }
  else if (pct >= 0.88) { band = '8.0'; comment = 'Very Good User — 表现很好，细节可再打磨。'; }
  else if (pct >= 0.83) { band = '7.5'; comment = 'Good User — 良好水平，继续提升准确度。'; }
  else if (pct >= 0.75) { band = '7.0'; comment = 'Good User — 不错的表现，加强薄弱环节。'; }
  else if (pct >= 0.67) { band = '6.5'; comment = 'Competent User — 具备基本能力，需系统练习。'; }
  else if (pct >= 0.58) { band = '6.0'; comment = 'Competent User — 还需努力，多做真题。'; }
  else if (pct >= 0.50) { band = '5.5'; comment = 'Modest User — 基础尚可，建议重点突破。'; }
  else if (pct >= 0.42) { band = '5.0'; comment = 'Modest User — 需要加强基础训练。'; }
  else if (pct >= 0.33) { band = '4.5'; comment = 'Limited User — 建议从基础词汇语法开始。'; }
  else { band = '<4.5'; comment = 'Limited User — 需要系统学习，不要气馁！'; }
  return { band, comment, pct: pct100 };
}

function renderQNav(questions) {
  const mod = state.currentModule;
  const key = state.currentTest + '_' + mod;
  let html = '<div class="q-nav" id="qNav">';
  questions.forEach((q, i) => {
    const ansKey = key + '_' + i;
    const answered = state.answers[ansKey] !== undefined;
    html += '<button class="q-nav-btn' + (answered ? ' answered' : '') + '" onclick="scrollToQ(' + i + ')" title="Q' + (i+1) + '">' + (i+1) + '</button>';

  const qEl = document.getElementById('q-' + qIdx);

    qEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    qEl.style.transition = 'background 0.3s';
    qEl.style.background = 'rgba(212,168,67,0.2)';
    setTimeout(function(){ qEl.style.background = ''; }, 800);
  }
}

function updateQNavButtons() {

// ===== Vocab Book =====
function getVocab() {
  try { return JSON.parse(localStorage.getItem('ielts-vocab') || '[]'); }
  catch(e) { return []; }
}

function saveVocab(vocab) {
  localStorage.setItem('ielts-vocab', JSON.stringify(vocab));
}

function addVocabWord(word, context) {
  var vocab = getVocab();
  if (vocab.some(function(v) { return v.word.toLowerCase() === word.toLowerCase(); })) {
    toast('该单词已在生词本中');
    return;
  }
  vocab.push({ word: word, context: context || '', timestamp: Date.now() });
  saveVocab(vocab);
  checkAchievements();
  renderVocabList();
  toast('已添加: ' + word);
}

function addVocabManual() {
  var input = document.getElementById('vocabManualInput');
  var word = input.value.trim();
  if (!word) { toast('请输入单词'); return; }
  addVocabWord(word, '手动添加');
  input.value = '';
}

function removeVocab(idx) {
  var vocab = getVocab();
  vocab.splice(idx, 1);
  saveVocab(vocab);
  renderVocabList();
  toast('已删除');
}

function clearVocab() {
  saveVocab([]);
  renderVocabList();
  toast('生词本已清空');
}

function renderVocabList() {
  var el = document.getElementById('vocabList');
  if (!el) return;
  var vocab = getVocab();
  if (!vocab.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><p>双击阅读文章中的单词即可收藏</p><p class="text-sub" style="font-size:0.75rem;">也可以在上方输入框手动添加</p></div>';
    return;
  }
  el.innerHTML = vocab.map(function(v, i) {
    return '<div class="vocab-item"><div><div class="word">' + escapeHtml(v.word) +
      '</div><div class="context">' + escapeHtml(v.context) + ' · ' + new Date(v.timestamp).toLocaleDateString('zh-CN') +
      '</div></div><button class="del-vocab" onclick="removeVocab(' + i + ')">删除</button></div>';
  }).join('');
}

function showVocabBook() {
  document.getElementById('vocabModal').classList.add('show');
  renderVocabList();
}

function closeVocabModal() {
  document.getElementById('vocabModal').classList.remove('show');
}

function setupPassageDblClick() {
  var passage = document.querySelector('.passage');
  if (!passage) return;
  passage.addEventListener('dblclick', function(e) {
    var selection = window.getSelection();
    var word = selection.toString().trim();
    if (word && /^[a-zA-Z]+$/.test(word) && word.length > 2) {
      var range = selection.getRangeAt(0);
      var textNode = range.startContainer;
      var fullText = textNode.textContent || '';
      var idx = range.startOffset;
      var contextStart = Math.max(0, idx - 25);
      var contextEnd = Math.min(fullText.length, idx + word.length + 25);
      var context = fullText.substring(contextStart, contextEnd).replace(/\s+/g, ' ').trim();
      addVocabWord(word, '...' + context + '...');
    }
  });
}

  { id: 'three_days', name: '坚持3天', desc: '3次不同日期的答题记录', icon: '🔥', check: function() {
    var days = new Set();
    Object.values(state.results).forEach(function(r) { if (r.timestamp) days.add(new Date(r.timestamp).toDateString()); });
    return days.size >= 3;
  }},
  { id: 'perfect_score', name: '满分达人', desc: '单模块获得100%正确率', icon: '💯', check: function() {
    return Object.entries(state.results).some(function(e) {
      var k = e[0], r = e[1];
      if (k.endsWith('_listening') || k.endsWith('_reading')) return r.total > 0 && r.correct === r.total;
      return false;
    });
  }},
  { id: 'vocab_master', name: '词汇大师', desc: '收藏20+个生词', icon: '📚', check: function() { return getVocab().length >= 20; } },
  { id: 'archaeologist', name: '考古学家', desc: '完成5套不同真题', icon: '🏺', check: function() {
    var testSet = new Set();
    Object.keys(state.results).forEach(function(k) { testSet.add(k.split('_')[0]); });
    return testSet.size >= 5;
  }},
  { id: 'listening_pro', name: '听力高手', desc: '听力正确率≥80%', icon: '🎧', check: function() {
    return TESTS.some(function(t) {
      var k = t.id + '_listening';
      var r = state.results[k];
      return r && r.total > 0 && (r.correct / r.total) >= 0.8;
    });
  }},
  { id: 'reading_pro', name: '阅读高手', desc: '阅读正确率≥80%', icon: '📖', check: function() {
    return TESTS.some(function(t) {
      var k = t.id + '_reading';
      var r = state.results[k];
      return r && r.total > 0 && (r.correct / r.total) >= 0.8;
    });
  }},
  { id: 'all_tests', name: '全勤勇士', desc: '完成所有10套真题的任意模块', icon: '⚔️', check: function() {
    var testSet = new Set();
    Object.keys(state.results).forEach(function(k) { testSet.add(k.split('_')[0]); });
    return testSet.size >= TESTS.length;
  }},
  { id: 'speed_demon', name: '速通达人', desc: '考试模式下提前5分钟交卷且正确率≥70%', icon: '⚡', check: function() {
    var records = JSON.parse(localStorage.getItem('ielts-speed-records') || '[]');
    return records.some(function(r) { return r.timeLeft >= 300 && r.pct >= 70; });
  }}
];

function getAchievements() {
  try { return JSON.parse(localStorage.getItem('ielts-achievements') || '[]'); }
  catch(e) { return []; }
}

function checkAchievements() {
  var unlocked = getAchievements();
  var changed = false;
  ACHIEVEMENTS.forEach(function(ach) {
    if (!unlocked.find(function(u) { return u.id === ach.id; }) && ach.check()) {
      unlocked.push({ id: ach.id, unlockedAt: Date.now() });
      changed = true;
      toast('🏆 解锁成就: ' + ach.name + '!');
    }
  });
  if (changed) {
    localStorage.setItem('ielts-achievements', JSON.stringify(unlocked));
  }
  renderAchievements();
  return unlocked;
}

function renderAchievements() {
  var el = document.getElementById('achievementsGrid');
  if (!el) return;
  var unlocked = getAchievements();
  el.innerHTML = ACHIEVEMENTS.map(function(ach) {
    var u = unlocked.find(function(ux) { return ux.id === ach.id; });
    if (u) {
      return '<div class="achievement-card unlocked"><div class="ach-icon">' + ach.icon + '</div><div class="ach-name">' + ach.name + '</div><div class="ach-desc">' + ach.desc + '</div><div class="ach-date">' + new Date(u.unlockedAt).toLocaleDateString('zh-CN') + '</div></div>';
    }
    return '<div class="achievement-card locked"><div class="ach-icon">🔒</div><div class="ach-name">' + ach.name + '</div><div class="ach-desc">' + ach.desc + '</div></div>';
  }).join('');
}

// ===== Bottom Nav =====
function bnNav(target) {
  if (target === 'home') {
    showView(null);
  } else if (target === 'stats') {
    showView('stats');
  } else if (target === 'errors') {
    showView('errors');
  } else if (target === 'vocab') {
    showVocabBook();
  } else if (target === 'templates') {
    showTemplates('task1');
  }
  bnSetActive(target);
}

function bnSetActive(target) {
  var items = document.querySelectorAll('#bottomNav .bn-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('active', items[i].dataset.nav === target);
  }
}

// ===== Function Overrides =====
var __origShowView = showView;
showView = function(view) {
  __origShowView(view);
  if (view === 'stats') bnSetActive('stats');
  else if (view === 'errors') bnSetActive('errors');
  else if (view === 'templates') bnSetActive('templates');
  else bnSetActive('home');
};

var __origSubmitModule = submitModule;
submitModule = function() {
  __origSubmitModule();

  // Track speed runner
  var mod = state.currentModule;
  if (state.mode === 'exam' && (mod === 'listening' || mod === 'reading')) {
    if (state.timeLeft >= 300) {
      var key = state.currentTest + '_' + mod;
      var r = state.results[key];
      if (r && r.total > 0) {
        var pct = Math.round(r.correct / r.total * 100);
        if (pct >= 70) {
          var records = JSON.parse(localStorage.getItem('ielts-speed-records') || '[]');
          records.push({ timeLeft: state.timeLeft, pct: pct, timestamp: Date.now() });
          localStorage.setItem('ielts-speed-records', JSON.stringify(records));
        }
      }
    }
  }

  checkAchievements();

  // Update modal with enhanced band score
  var key2 = state.currentTest + '_' + state.currentModule;
  var r2 = state.results[key2];
  if (r2 && r2.total > 0) {
    var eb = getBandScoreEnhanced(r2.correct, r2.total);
    document.getElementById('resultBand').textContent = 'Band Score ' + eb.band + ' · ' + eb.comment;
    document.getElementById('resultScore').textContent = '得分: ' + r2.correct + '/' + r2.total;
  }
};

var __origRenderTestList = renderTestList;
renderTestList = function() {
  __origRenderTestList();
  var items = document.querySelectorAll('#testList .test-item');
  items.forEach(function(item) {
    var onclick = item.getAttribute('onclick');
    var match = onclick.match(/'([^']+)'/);
    if (!match) return;
    var testId = match[1];
    if (!item.querySelector('.fav-star')) {
      var star = document.createElement('button');
      star.className = 'fav-star' + (isFavorited(testId) ? ' faved' : '');
      star.textContent = isFavorited(testId) ? '★' : '☆';
      star.onclick = function(e) { toggleFavorite(testId, e); };
      star.title = isFavorited(testId) ? '取消收藏' : '收藏';
      item.appendChild(star);
    }
  });
  renderFavList();
};

var __origRenderListening = renderListening;
renderListening = function(md) {
  __origRenderListening(md);

  (md.sections || []).forEach(function(s, si) {
    var btn = document.getElementById('audioBtn' + si);
    if (btn) {
      var player = btn.closest('.audio-player');
      if (player && !player.querySelector('.audio-speed')) {
        player.insertAdjacentHTML('beforeend', renderSpeedButtons(si));
      }
    }
  });

  var questions = getQuestions();
  if (questions.length > 0) {
    var mc = document.getElementById('mainContent');
    var panelHeader = mc.querySelector('.panel-header');
    if (panelHeader && !document.getElementById('qNav')) {
      panelHeader.insertAdjacentHTML('afterend', renderQNav(questions));
    }
  }

  document.querySelectorAll('#mainContent .question').forEach(function(q, i) {
    if (!q.id) q.id = 'q-' + i;
  });
};

var __origRenderReading = renderReading;
renderReading = function(md, questions) {
  __origRenderReading(md, questions);

  if (questions.length > 0) {
    var mc = document.getElementById('mainContent');
    var panelHeader = mc.querySelector('.panel-header');
    if (panelHeader && !document.getElementById('qNav')) {
      panelHeader.insertAdjacentHTML('afterend', renderQNav(questions));
    }
  }

  document.querySelectorAll('#mainContent .question').forEach(function(q, i) {
    if (!q.id) q.id = 'q-' + i;
  });

  setTimeout(setupPassageDblClick, 100);
};

var __origSelectAnswer = selectAnswer;
selectAnswer = function(qIdx, optionIdx) {
  __origSelectAnswer(qIdx, optionIdx);
  updateQNavButtons();
};

var __origFillAnswer = fillAnswer;
fillAnswer = function(qIdx) {
  __origFillAnswer(qIdx);
  updateQNavButtons();
};

var __origLoadWelcomeStats = loadWelcomeStats;
loadWelcomeStats = function() {
  __origLoadWelcomeStats();
  checkAchievements();
  renderAchievements();
};

var __origInit = init;
init = function() {
  __origInit();
  renderFavList();
  checkAchievements();
  renderAchievements();
};

var __origToggleAudio = toggleAudio;
toggleAudio = function(sectionIdx) {
  __origToggleAudio(sectionIdx);
  var st = audioStates[sectionIdx];
  if (st && st.utterance) {
    var activeBtn = document.querySelector('#speedBtns' + sectionIdx + ' .spd-btn.active');
    if (activeBtn) {
      st.utterance.rate = parseFloat(activeBtn.dataset.rate);
    }
  }
};


var __origShowStats = showStats;
showStats = function() {
  __origShowStats();
  var mc = document.getElementById('mainContent');
  var hasContent = mc && mc.innerHTML && mc.innerHTML.indexOf('welcomePanel') === -1;
  // If stats is empty (no records), add CTA
  var statsContent = mc ? mc.innerHTML : '';
  if (statsContent && statsContent.indexOf('暂无学习记录') !== -1) {
    var emptyDiv = mc.querySelector('.empty-state') || mc.querySelector('.panel-body');
    if (emptyDiv) {
      emptyDiv.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><p>还没有学习记录，开始你的第一套真题吧！</p><button class="btn btn-primary" onclick="showView(\'tests\')">开始第一套练习</button></div>';
    }
  }
  bnSetActive('stats');
};

var __origShowErrors = showErrors;
showErrors = function() {
  __origShowErrors();
  var mc = document.getElementById('mainContent');
  var errContent = mc ? mc.innerHTML : '';
  if (errContent && errContent.indexOf('暂无错题记录') !== -1) {
    var emptyDiv = mc.querySelector('.empty-state') || mc.querySelector('.panel-body');
    if (emptyDiv) {
      emptyDiv.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>暂无错题记录，继续加油！</p><button class="btn btn-primary" onclick="showView(\'tests\')">去真题练习</button></div>';
    }
  }
  bnSetActive('errors');
};
</script>
